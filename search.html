<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全平台搜尋 — 兒少人權監督平台</title>
<meta name="description" content="跨議題卡片、政策段落、倡議檔案、CRC 條文之全文搜尋">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAFAF7; --bg-alt:#F1EFEA; --bg-deep:#0E2238; --bg-deeper:#081728;
  --text:#1F1F1F; --text-muted:#5C5C5C;
  --brand:#B5371F; --brand-dark:#8C2A18; --brand-soft:#F4E1DC;
  --warning:#A03032; --success:#2D5F3E; --aabe-gold:#8B6F50;
  --border:#DDD8CD; --hairline:#E8E3D6;
  --serif:"Noto Serif TC",Georgia,serif; --sans:"Noto Sans TC",-apple-system,sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); font-size: 16px; line-height: 1.6; color: var(--text); background: var(--bg); }
a { color: var(--bg-deep); }
a:hover { color: var(--brand); }
header { background: var(--bg-deep); color: #fff; padding: 18px 24px; }
.header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.header-inner svg.logo { color: var(--aabe-gold); }
header h1 { font-family: var(--serif); font-size: 20px; flex: 1; }
header .aabe-mark { background: var(--aabe-gold); color: #fff; padding: 4px 8px; border-radius: 4px; font-family: Inter,sans-serif; font-weight: 800; font-size: 12px; letter-spacing: 0.06em; }
header a.back { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 13px; }
header a.back:hover { color: #fff; }
.search-bar { background: #fff; padding: 18px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.search-bar input { width: 100%; max-width: 880px; margin: 0 auto; display: block;
                    padding: 14px 18px; font-size: 17px; border: 1px solid var(--border);
                    border-radius: 8px; font-family: var(--sans); background: var(--bg-alt); }
.search-bar input:focus { outline: 2px solid var(--brand); outline-offset: 2px; background: #fff; }
.filter { max-width: 880px; margin: 12px auto 0; display: flex; gap: 6px; flex-wrap: wrap; }
.filter button { padding: 6px 13px; border: 1px solid var(--border); background: #fff;
                  border-radius: 999px; cursor: pointer; font-size: 13px; color: var(--text-muted); font-family: inherit; transition: all .15s; }
.filter button:hover { border-color: var(--bg-deep); color: var(--text); }
.filter button.active { background: var(--brand); color: #fff; border-color: var(--brand); }
main { max-width: 880px; margin: 0 auto; padding: 24px 16px 80px; }
.stats { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; font-family: Inter,sans-serif; }
.result { background: #fff; padding: 16px 20px; margin: 10px 0; border-radius: 6px;
          border: 1px solid var(--border); border-left: 4px solid var(--brand); transition: all .15s; }
.result:hover { border-color: var(--brand); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(14,34,56,0.06); }
.result.type-issue { border-left-color: var(--warning); }
.result.type-passage { border-left-color: #1F3D6B; }
.result.type-advocacy { border-left-color: var(--bg-deep); }
.result.type-external_shadow { border-left-color: #4B2480; }
.result.type-crc_official { border-left-color: var(--aabe-gold); }
.result.type-nap { border-left-color: #C68822; }
.result.type-nhrc_indicator { border-left-color: var(--success); }
.result.type-law { border-left-color: #2D7059; }
.result.type-law_amendment { border-left-color: var(--text-muted); }
.result h3 { font-family: var(--serif); font-size: 16px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
.result h3 a { color: var(--bg-deep); text-decoration: none; }
.result h3 a:hover { color: var(--brand); }
.result .type-badge { display: inline-block; font-size: 10.5px; padding: 2px 8px;
                       border-radius: 3px; background: var(--bg-alt); color: var(--text-muted);
                       margin-right: 6px; vertical-align: middle; font-family: Inter,sans-serif;
                       font-weight: 600; letter-spacing: 0.04em; }
.result .snippet { font-size: 13.5px; color: var(--text); line-height: 1.65; margin: 6px 0; }
.result .snippet mark { background: #FCE2A8; padding: 0 3px; border-radius: 2px; color: var(--text); }
.result .tags { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-family: Inter,sans-serif; }
.empty { text-align: center; color: var(--text-muted); padding: 40px; }
footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--hairline); margin-top: 48px; background: var(--bg-alt); }
</style>
<meta property="og:image" content="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 630'%3E%3Crect width='1200' height='630' fill='%230E2238'/%3E%3Cpath fill='%238B6F50' d='M600 200l-80 30v100c0 80 80 110 80 110s80-30 80-110V230L600 200z'/%3E%3Ctext x='600' y='480' fill='%23FAFAF7' font-family='Noto Serif TC,serif' font-size='52' font-weight='900' text-anchor='middle'%3E兒少人權監督平台%3C/text%3E%3Ctext x='600' y='540' fill='%23B5371F' font-family='Inter,sans-serif' font-size='28' font-weight='700' text-anchor='middle' letter-spacing='4'%3ECHILD RIGHTS WATCH TAIWAN · AABE%3C/text%3E%3C/svg%3E">
<meta property="og:type" content="website">
<meta property="og:locale" content="zh_TW">
</head>
<body>

<a href="#main" style="position:absolute;left:-999px;" onfocus="this.style.left='12px';this.style.top='12px';">跳到主要內容</a>

<header>
  <div class="header-inner">
    <svg class="logo" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <h1>全平台搜尋</h1>
    <span class="aabe-mark">AABE</span>
    <a href="index.html" class="back">← 回首頁</a>
  </div>
  <p style="margin: 4px 0 0; font-size: 13px; color: #ccc;" id="hdr-stats">載入中…</p>
</header>

<div class="search-bar">
  <input id="q" type="search" placeholder="關鍵字(如:剴剴、自殺、實驗教育、CRC2-CO31、勵馨、結論性意見)" autofocus aria-label="搜尋關鍵字">
  <div class="filter" role="group" aria-label="類型篩選">
    <button data-type="all" class="active">全部</button>
    <button data-type="issue">議題卡</button>
    <button data-type="passage">政策段落</button>
    <button data-type="advocacy">AABE 倡議</button>
    <button data-type="external_shadow">民間影子報告</button>
    <button data-type="crc_official">CRC 官方文件</button>
    <button data-type="nap">NAP 行動</button>
    <button data-type="law">法規</button>
    <button data-type="law_amendment">修法</button>
    <button data-type="nhrc_indicator">NHRC 指標</button>
  </div>
</div>

<main id="main">
  <div id="stats" class="stats">輸入關鍵字開始搜尋</div>
  <div id="results"></div>
</main>

<footer>
  <a href="./">← 回首頁</a> ‧ <a href="map.html">議題地圖</a> ‧ 索引版本:2026-04-27
</footer>

<script>
let INDEX = null;
let activeType = 'all';
const qInput = document.getElementById('q');
const statsEl = document.getElementById('stats');
const resultsEl = document.getElementById('results');

fetch('search-index.json')
  .then(r => r.json())
  .then(data => {
    INDEX = data;
    statsEl.textContent = `已載入 ${data.items.length} 筆,版本 ${data.version} · 輸入關鍵字開始搜尋`;
    // 更新 header 計數
    const cnt = {};
    data.items.forEach(it => cnt[it.type] = (cnt[it.type] || 0) + 1);
    const labels = {issue:'議題', passage:'段落', advocacy:'倡議', external_shadow:'民間影子報告',
                    crc_official:'CRC 官方文件', nap:'NAP', nhrc_indicator:'NHRC 指標',
                    law:'法規', law_amendment:'修法'};
    const parts = Object.entries(cnt).map(([t,n]) => `${n} ${labels[t]||t}`);
    document.getElementById('hdr-stats').textContent = `${parts.join(' / ')} = 共 ${data.items.length} 筆`;
    // Auto-fill from ?q= URL param
    const params = new URLSearchParams(location.search);
    const initQ = params.get('q');
    if (initQ) { qInput.value = initQ; search(); }
  })
  .catch(err => {
    statsEl.textContent = '索引載入失敗,請稍後再試:' + err.message;
  });

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + escapeRegex(q) + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function search() {
  const q = qInput.value.trim().toLowerCase();
  if (!INDEX || !q) {
    resultsEl.innerHTML = '';
    statsEl.textContent = q ? '索引尚未載入...' : '輸入關鍵字開始搜尋';
    return;
  }
  const matches = INDEX.items.filter(it => {
    if (activeType !== 'all' && it.type !== activeType) return false;
    return it.search_text && it.search_text.includes(q);
  });
  statsEl.textContent = `找到 ${matches.length} 筆(共 ${INDEX.items.length} 筆 / 類型:${activeType})`;
  if (matches.length === 0) {
    resultsEl.innerHTML = '<div class="empty">沒有找到符合的結果。試試別的關鍵字?</div>';
    return;
  }
  CURRENT_MATCHES = matches;
  CURRENT_LIMIT = 50;
  renderMatches();
}

let CURRENT_MATCHES = [];
let CURRENT_LIMIT = 50;
const TYPE_LABELS = {
  issue: '議題卡', passage: '段落', advocacy: '倡議',
  external_shadow: '民間影子報告', crc_official: 'CRC 官方文件',
  nap: 'NAP', nhrc_indicator: 'NHRC 指標', law: '法規', law_amendment: '修法',
};

function renderMatches() {
  const matches = CURRENT_MATCHES;
  if (!matches.length) return;
  const slice = matches.slice(0, CURRENT_LIMIT);
  const q = qInput.value.trim();
  resultsEl.innerHTML = slice.map(it => {
    const typeLabel = TYPE_LABELS[it.type] || it.type;
    const snippet = highlight(it.snippet || '', q);
    const url = it.url || '#';
    return `<div class="result type-${it.type}">
      <h3><span class="type-badge">${typeLabel}</span><a href="${url}">${highlight(it.title, q)}</a></h3>
      <p class="snippet">${snippet}</p>
      ${it.tags && it.tags.length ? `<p class="tags">${it.tags.filter(Boolean).join(' ‧ ')}</p>` : ''}
    </div>`;
  }).join('');
  if (matches.length > CURRENT_LIMIT) {
    resultsEl.innerHTML += `<div class="empty">已顯示 ${CURRENT_LIMIT} / ${matches.length} 筆 — <button id="load-more" style="background:var(--brand,#B5371F);color:#fff;border:0;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:inherit">載入更多 50 筆</button></div>`;
    const btn = document.getElementById('load-more');
    if (btn) btn.addEventListener('click', () => { CURRENT_LIMIT += 50; renderMatches(); });
  }
}

qInput.addEventListener('input', search);
document.querySelectorAll('.filter button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.getAttribute('data-type');
    search();
  });
});
</script>

</body>
</html>
