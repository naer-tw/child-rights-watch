遊樂 場； （4） 自己及家人受到適當的支持服務。"}, {"co_id": "CRC1-CO59", "cycle": 1, "co_paragraph": "59", "text_zh": "委員會關切住在機構內身心障礙兒少的數量居高不下。委員會欣 見政府採取 5 年策略（計畫） ，增加身心障礙兒少在社區生活的 人數，並提供身心障礙兒少進入主流學校接受融合教育的機會。 健康權（第 24 條）"}, {"co_id": "CRC1-CO60", "cycle": 1, "co_paragraph": "60", "text_zh": "委員會關切兒少不論能力如何，均須徵得父母同意才能接受醫療 的情況，此與聯合國兒童權利委員會的觀點不一致。兒童權利委 員會認為，凡是具備充分理解能力之兒少，縱使父母不同意，仍 可以自主接受醫療。"}, {"co_id": "CRC1-CO61", "cycle": 1, "co_paragraph": "61", "text_zh": "委員會建議政府修改相關法律，使兒少接受醫療所需同意之規定 符合《CRC》 ，特別是第5 條和第 12 條。亦建議政府實施聯合國 兒童權利委員會第 12 號一般性意見（第 102 段）之制度，規定 兒少取得同意權的特定年齡。"}, {"co_id": "CRC1-CO62", "cycle": 1, "co_paragraph": "62", "text_zh": "委員會欣見政府努力為兒少提供專家們的心理健康服務，包括社 區心理健康門診、心理健康專科和熱線服務。不過，委員會關切 兒少心理健康問題的發生率，特別是高自殺率以及所提供服務的 實效性。"}, {"co_id": "CRC1-CO63", "cycle": 1, "co_paragraph": "63", "text_zh": "委員會建議政府： （1） 持續蒐集有關兒少心理健康情況和少年自殺的數據，在可行 且適切的前提下，根據性質、年齡、性別、城鄉分布、原住 民身分和性傾向等項目分類； （2） 監測和評估所提供給兒少服務的實效性，包括透過專線尋求 協助兒少轉介率及成效； （3） 確保心理健康服務（包含對兒少友善的預防性服務）可以被 使用、可以被親近並且可以被接受，且服務品質符合聯合國 兒童權利委員會有關健康權利的第 15 號一般性意見； （4） 根據《CRC》第 12 條，積極徵詢兒少意見，以協助發展、實 施及監測兒少心理健康服務。"}, {"co_id": "CRC2-CO57", "cycle": 2, "co_paragraph": "57", "text_zh": "委員會注意到兒少對學校服儀規定的擔憂。 委員會建議，法律應要 求學校徵詢兒少意見，並確保服儀規 定及其實施是無歧視性的，並 符合他們享有之所有兒少權利。 休息、遊戲、休閒權"}, {"co_id": "CRC2-CO58", "cycle": 2, "co_paragraph": "58", "text_zh": "委員會對於兒少缺乏休息、遊戲 及休閒活動的時間仍然深感關切， 這是由於兒少長時間在學校及課後教育中度過。委員會建議： (1) 上學時間的規定應強制執行並受監督； (2) 政府應考慮針對所謂的「補習班」，規範其上課時間與教學方法； 及 (3) 持續努力告知父母（監護人），當休息與遊戲的時間有限時，會對 孩子的發育及健康產生負面影響。"}, {"co_id": "CRC2-CO59", "cycle": 2, "co_paragraph": "59", "text_zh": "為確保兒少享有遊戲與休閒的權利，且能安全地進行，委員會建議 引進立法，要求中央及地方政府確保兒少遊戲與休閒的權利得到解 決，並在城鄉發展政策及規劃過程中徵求兒少意見。 文化與原住民兒少"}, {"co_id": "CRC2-CO60", "cycle": 2, "co_paragraph": "60", "text_zh": "委員會承認政府付出相當大的努力促進原住民兒少的文化權，及其 說母語的機會。委員會建議政府與原住民兒少互動，納入他們的觀 點，以有效支持原住民兒少享有他們的文化。 十、特別保護措施（第 22 條、第 30 條、第 32 條、第 33 條、 第 35 條至第 36 條、第 37 條(b)至(d)項，及第 38 條至第 40 條） 難民與尋求庇護者"}, {"co_id": "CRC2-CO61", "cycle": 2, "co_paragraph": "61", "text_zh": "考慮到臺灣特殊情形，以及缺乏對於難民與尋求庇護者支持的共 識，難以成功通過難民法，儘管如此，委員會仍關心被以個案處理 的是類兒少情形。因此委員會鼓勵政府積極嘗試建立對待這些個案 的具體規則，並符合國際協議與程序標準。 經濟剝削"}, {"co_id": "CRC2-CO62", "cycle": 2, "co_paragraph": "62", "text_zh": "委員會讚賞童工最低年齡符合《國際勞工組織第 138 號公約》。然 而，委員會關注到有一些未滿 6 歲、6 歲至 11 歲、6 歲至 15 歲兒少 有從事工作，且不清楚現行 15 歲以上童工的勞動標準是否適用這些 未滿 15 歲卻在工作的兒少。地方主管機關目前實務上係依據《勞動 基準法第四十五條無礙身心健康認定基準及審查辦法 》辦理。但委 員會建議政府採取必要措施，確保未滿 15 歲兒少從事工作完全符合 《國際勞工組織第 138 號公約》。 藥物濫用"}, {"co_id": "CRC2-CO63", "cycle": 2, "co_paragraph": "63", "text_zh": "委員會欣見兒少使用毒品不被視為違法者對待，而是視為曝險兒 少，並且提供適當指引與協助。然而，因處理施用毒品兒少的少年 法庭可以決定採行保護或少年司法措施，可能會使少年進入矯正機 關接受感化教育。委員會建議對所有施用毒品的兒少皆採行保護措 施，包含被認為藥物成癮的兒少。 18"}], "esrs": [{"report_id": "ESR-2017-TAASA", "year": 2017, "ngo_name": "台灣少年權益與福利促進聯盟", "focus_articles": "[4, 6, 12, 19, 24, 27, 31, 37, 40]"}, {"report_id": "ESR-2022-CRRC", "year": 2022, "ngo_name": "台灣兒童權利公約聯盟", "focus_articles": "[4, 6, 12, 19, 20, 24, 27, 31, 34, 37, 40]"}, {"report_id": "ESR-2017-EDEN", "year": 2017, "ngo_name": "兒童伊甸社會福利基金會", "focus_articles": "[2, 23, 28, 31]"}, {"report_id": "ESR-2022-EDREFORM", "year": 2022, "ngo_name": "教育改革總諮詢委員會(教改總會)", "focus_articles": "[28, 29, 30, 31]"}]}, {"crc_id": "CRC-32", "no": 32, "name_zh": "經濟剝削禁止", "name_en": "", "text_zh": "", "plain_zh": "", "cluster": "", "gcs": [], "pis": [], "cos": [{"co_id": "CRC1-CO64", "cycle": 1, "co_paragraph": "64", "text_zh": "委員會欣見政府為解決兒童肥胖問題所採取的一系列措施，但建 議： （1） 政府評估及監測這些措施的成效； （2） 在學校量測兒童體重時應審慎進行， 確保過程保護兒童隱私 且不會使兒童受到羞辱。"}, {"co_id": "CRC1-CO65", "cycle": 1, "co_paragraph": "65", "text_zh": "委員會指出，政府自 2011 年起採行逐步全面性推動整體兒少性 教育及生育保健計畫（包括教材、課程、方案及活動等）。委員會 亦指出，多個 NGO 對其成效及合宜性表達強烈關切，性傳染病 發生率仍高、部分疾病發生率正在增加，且仍有相當比例的青少 年懷孕。"}, {"co_id": "CRC1-CO66", "cycle": 1, "co_paragraph": "66", "text_zh": "委員會建議政府檢討現行計畫內容，評估是否需修訂以改善其成 效及確保其合宜性 。 檢討過程應諮詢所有利害關係人，包括兒少、 家長團體、衛生專業人員和教育工作者。"}, {"co_id": "CRC1-CO67", "cycle": 1, "co_paragraph": "67", "text_zh": "委員會進一步建議審查評估現行的性健康和生育保健計畫是否： （1） 與經濟社會和文化權利委員會第 22 號一般性意見（關於少 年性健康與生育保健） 、聯合國兒童權利委員會第 4 號一般 性意見（關於少年健康與發展）及第 20 號一般性意見（關 於兒少權利）的內容一致； （2） 適齡且具實證基礎； （3） 旨在保護所有兒少的性健康和生育保健權，包括 LGBTI 兒 少及身心障礙兒少； （4） 符合《CRC》第12 條規定，於方案設計、實施及評估時納入 兒少意見； （5） 在兒少發生性行為之前，提供兒少親密關係應互相尊重等相 關資訊，並培養兒少對於性行為的正確觀念； （6） 為懷孕少女提供適當的資訊及支持服務； （7） 教導父母瞭解兒少的性健康及生育保健相關權利。"}, {"co_id": "CRC1-CO68", "cycle": 1, "co_paragraph": "68", "text_zh": "委員會聽到兒少代表對環境品質以及可能損害其健康的擔憂。委 員會建議政府採取措施監測環境對兒少健康的影響，也建議政府 建立相關制度或流程，使兒少得以向政府表達對環境或其他兒少 健康議題之關切，並參考聯合國兒童權利委員會繼 2016 年關於 兒少權利與環境之一般性討論所提出的建議，將兒少所表示的意 見納入適當的立法或行動中。 八、 教育休閒與文化活動（第 28 條至第 31 條） 教育權（第 28 條、第 29 條） 改善就學負擔差距"}, {"co_id": "CRC1-CO69", "cycle": 1, "co_paragraph": "69", "text_zh": "委員會欣見 6 至 15 歲的義務教育免收學費。然而，委員會關切 越來越多私立高中職學生須申請貸款才能負擔學費、其他學習費 用及生活開支。"}, {"co_id": "CRC1-CO70", "cycle": 1, "co_paragraph": "70", "text_zh": "委員會建議教育部全面檢視私立高中職收費情形，並建立審查機 制，以保護經濟弱勢學生免受私立學校過度收費。委員會進一步 建議政府推行適當計畫，協助無力償還貸款的學生。 學前教育"}, {"co_id": "CRC1-CO71", "cycle": 1, "co_paragraph": "71", "text_zh": "委員會對於公立和非營利幼兒園不足、就讀私立幼兒園帶給家長 的沉重經濟負擔表達關切。委員會亦關切地方主管機關需要額外 的人力和經費，才能落實《幼兒教育及照顧法》第 7 條。"}, {"co_id": "CRC2-CO64", "cycle": 2, "co_paragraph": "64", "text_zh": "製造、販賣或運輸非法毒品的兒少被起訴，如果罪名成立，最高可 判處 4 年有期徒刑。委員會建議政府採取一切適當措施，包括在必 要時修法，以確保對於從事製造、販賣或運輸非法毒品的兒少，改 以罰金刑及轉向處遇等替代處分，剝奪自由應為最後手段。 觸法兒少"}, {"co_id": "CRC2-CO65", "cycle": 2, "co_paragraph": "65", "text_zh": "委員會欣見政府依據首次結論性意見修正《少年事件處理法》，意 指廢除少年虞犯（身分 罪），且未滿 12 歲兒童犯罪不會被起訴。 依據《少年事件處理法》，未滿 18 歲少年觸法行為得以少年保護事 件或少年刑事案件處理。然而，委員會關切的是，這可能意指依據 《少年事件處理法》判刑的 12 歲或 13 歲兒少會被收容在少年觀護 所。委員會建議政府修正《少年事件處理法》，確保不起訴未滿 14 歲的兒少。"}, {"co_id": "CRC2-CO66", "cycle": 2, "co_paragraph": "66", "text_zh": "委員會注意到政府機關在會議過程中所提供的資訊，對於父母(監護 人)探視矯正機關的兒少是沒有任何限制的。然而， 委員會關切的 是，這些機關自己設置的規定，可能導致家人探視的限制或歧視。 關於家人探視兒少與透過電話及 (或)社群媒體（social media ）連絡 的政策，委員會鼓勵政府提供矯正機關一套相關規定。對於入監服 刑的少年也應有類似規定。"}, {"co_id": "CRC2-CO67", "cycle": 2, "co_paragraph": "67", "text_zh": "委員會建議，收容兒少使其 與父母(監護人)分離均能採取《 CRC》 第 25 條的定期評估，特別注意兒少與父母(監護人)團聚的可能性。 修復式司法"}, {"co_id": "CRC2-CO68", "cycle": 2, "co_paragraph": "68", "text_zh": "《少年事件處理法》提供少年法庭為兒少尋求外部組織提供修復式 司法的可能性。 委員會鼓勵政府儘快實施，成為少年法庭選項之 一，並使修復式司法能整合為兒少司法的一部分。 買賣兒童、性剝削及性虐待兒童"}, {"co_id": "CRC2-CO69", "cycle": 2, "co_paragraph": "69", "text_zh": "委員會注意到，政府採取措施處理網路散播性虐待影像問題的過程 中，已融入 OPSC 任擇議定書及 CRC 對兒童賣淫及色情相關規定。 委員會建議政府制定一個綜合性的政策，包括《CRC》一般性原則 的執行，以防止對兒少的買賣及性剝削，該政策應符合聯合國兒童 權利委員會在其 OPSC 實施指南中提出的所有建議。 十一、公約任擇議定書的通過及採納 關於買賣兒童、兒童賣淫及兒童色情問題之任擇議定書 (OPSC) 及關於 兒童捲入武裝衝突之任擇議定書 (OPAC)"}, {"co_id": "CRC2-CO70", "cycle": 2, "co_paragraph": "70", "text_zh": "委員會注意到政府已努力 將 OPSC 融入現行相關法令及措施 。然 而，委員會建議政府對所有法規進行檢視，以確保完全遵守 OPSC 及 OPAC 規定的義務。 肆、執行及報告 一、追蹤"}, {"co_id": "CRC2-CO71", "cycle": 2, "co_paragraph": "71", "text_zh": "委員會建議政府採取一切適當措施，確保結論性意見完全落實，並 向兒少，包括不利處境兒少都能廣泛宣傳。並建議以國家語言廣泛 宣傳第二次定期報告、問題清單的答復及本結論性意見。"}], "esrs": []}, {"crc_id": "CRC-33", "no": 33, "name_zh": "毒品保護", "name_en": "", "text_zh": "", "plain_zh": "大人有責任保護你不接觸毒品,也要幫助已經沾上的小孩戒掉。", "cluster": "", "gcs": [], "pis": ["PI-06"], "cos": [{"co_id": "CRC1-CO49", "cycle": 1, "co_paragraph": "49", "text_zh": "最後 ， 依據 《聯合國兒童替代性照顧準則》 ， 委員會強調為準備離 開替代性照顧 體系的兒少設定有效且適當的計畫及方案至關重 要，這些計畫與方案協助兒少（適當時，包含家屬）做好離開替 代性照顧體系的準備，且在適當時期內提供所有必要的支持性服 務。 國內及跨國境收養（第 21 條）"}, {"co_id": "CRC1-CO50", "cycle": 1, "co_paragraph": "50", "text_zh": "委員會注意到，國內兒少收養之年度人數低於外國收養臺灣兒少 之人數，也注意到近親及繼親收養終止比率偏高。委員會建議政 府分析上述終止收養的原因，採取降低比率的補救措施，致力確 保所有兒少獲得適當照顧。委員會瞭解國內收養人通常不願意承 擔照顧有特殊需要兒少（包括身心障礙兒少和年齡較大的兒少） 的責任，因而唯有尋求跨國收養，但仍敦促政府提高問題意識， 倡導國內收養。"}, {"co_id": "CRC1-CO51", "cycle": 1, "co_paragraph": "51", "text_zh": "委員會關切政府監看跨國收養程序層級及成效的不足，包括對私 立收養機構的權限和監督。委員會建議臺灣採用海牙會議《跨國 收養合作及兒童保護公約》 （1993 年）作為具法律效力之文件， 以處理臺灣跨國收養案件。 六、 暴力侵害兒童（第 19 條，第 24 條第 3 項，第 28 條第 2 項，第 34 條，第 37 條（a）項和第 39 條）"}, {"co_id": "CRC1-CO52", "cycle": 1, "co_paragraph": "52", "text_zh": "委員會欣見政府為防範對兒少施暴所採取的各種措施，特別是體 罰及霸凌，也欣見政府為具有風險兒少及 6 歲以下弱勢兒童提供 之服務方案。"}, {"co_id": "CRC1-CO53", "cycle": 1, "co_paragraph": "53", "text_zh": "委員會建議政府： （1） 參考聯合國兒童權利委員會第 13 號一般性意見（2011 年） 提出的指引及建議，繼續加強現行及其他措施，並制定及施 行一個預防及保護兒少在所有環境（包含家庭）免受一切形 式暴力的長期性國家綜合行動計畫； （2） 為有助於達成聯合國永續發展目標 （目標16.2） 所列在 2030 年前結束對兒少一切形式暴力的國家、地方及 NGO 行動計 畫提供必要的人力和財力資源。"}, {"co_id": "CRC1-CO54", "cycle": 1, "co_paragraph": "54", "text_zh": "委員會欣見政府施行《校園霸凌防制準則》 ，但關切欠缺實施情 形、受害者等人無效力通報及後續處理機制的具體資訊。委員會 因此建議政府： （1） 經由徵詢兒少意見，重新檢視監督機制和通報程序，以確保 其成效； （2） 提高師生對「霸凌在受害兒少及學校社群所生負面影響」的 認知和意識； （3） 加強教師建構安全教室的能力，鼓勵被害人和目擊者通報霸 凌案件； （4） 為霸凌案件的被害人、加害人及其他受霸凌影響的兒少，提 供有效的輔導及修復。"}, {"co_id": "CRC1-CO55", "cycle": 1, "co_paragraph": "55", "text_zh": "在網路霸凌方面，委員會建議政府應督促平台供應商發展及強化 合宜的預防及申訴服務及機制。"}, {"co_id": "CRC1-CO56", "cycle": 1, "co_paragraph": "56", "text_zh": "委員會欣見已經立法禁絕在學校和機構內有體罰兒少之情事。然 而家內體罰並未被禁止，且學校內仍持續發生體罰的情事。"}, {"co_id": "CRC1-CO64", "cycle": 1, "co_paragraph": "64", "text_zh": "委員會欣見政府為解決兒童肥胖問題所採取的一系列措施，但建 議： （1） 政府評估及監測這些措施的成效； （2） 在學校量測兒童體重時應審慎進行， 確保過程保護兒童隱私 且不會使兒童受到羞辱。"}, {"co_id": "CRC1-CO65", "cycle": 1, "co_paragraph": "65", "text_zh": "委員會指出，政府自 2011 年起採行逐步全面性推動整體兒少性 教育及生育保健計畫（包括教材、課程、方案及活動等）。委員會 亦指出，多個 NGO 對其成效及合宜性表達強烈關切，性傳染病 發生率仍高、部分疾病發生率正在增加，且仍有相當比例的青少 年懷孕。"}, {"co_id": "CRC1-CO66", "cycle": 1, "co_paragraph": "66", "text_zh": "委員會建議政府檢討現行計畫內容，評估是否需修訂以改善其成 效及確保其合宜性 。 檢討過程應諮詢所有利害關係人，包括兒少、 家長團體、衛生專業人員和教育工作者。"}, {"co_id": "CRC1-CO67", "cycle": 1, "co_paragraph": "67", "text_zh": "委員會進一步建議審查評估現行的性健康和生育保健計畫是否： （1） 與經濟社會和文化權利委員會第 22 號一般性意見（關於少 年性健康與生育保健） 、聯合國兒童權利委員會第 4 號一般 性意見（關於少年健康與發展）及第 20 號一般性意見（關 於兒少權利）的內容一致； （2） 適齡且具實證基礎； （3） 旨在保護所有兒少的性健康和生育保健權，包括 LGBTI 兒 少及身心障礙兒少； （4） 符合《CRC》第12 條規定，於方案設計、實施及評估時納入 兒少意見； （5） 在兒少發生性行為之前，提供兒少親密關係應互相尊重等相 關資訊，並培養兒少對於性行為的正確觀念； （6） 為懷孕少女提供適當的資訊及支持服務； （7） 教導父母瞭解兒少的性健康及生育保健相關權利。"}, {"co_id": "CRC1-CO68", "cycle": 1, "co_paragraph": "68", "text_zh": "委員會聽到兒少代表對環境品質以及可能損害其健康的擔憂。委 員會建議政府採取措施監測環境對兒少健康的影響，也建議政府 建立相關制度或流程，使兒少得以向政府表達對環境或其他兒少 健康議題之關切，並參考聯合國兒童權利委員會繼 2016 年關於 兒少權利與環境之一般性討論所提出的建議，將兒少所表示的意 見納入適當的立法或行動中。 八、 教育休閒與文化活動（第 28 條至第 31 條） 教育權（第 28 條、第 29 條） 改善就學負擔差距"}, {"co_id": "CRC1-CO69", "cycle": 1, "co_paragraph": "69", "text_zh": "委員會欣見 6 至 15 歲的義務教育免收學費。然而，委員會關切 越來越多私立高中職學生須申請貸款才能負擔學費、其他學習費 用及生活開支。"}, {"co_id": "CRC1-CO70", "cycle": 1, "co_paragraph": "70", "text_zh": "委員會建議教育部全面檢視私立高中職收費情形，並建立審查機 制，以保護經濟弱勢學生免受私立學校過度收費。委員會進一步 建議政府推行適當計畫，協助無力償還貸款的學生。 學前教育"}, {"co_id": "CRC1-CO71", "cycle": 1, "co_paragraph": "71", "text_zh": "委員會對於公立和非營利幼兒園不足、就讀私立幼兒園帶給家長 的沉重經濟負擔表達關切。委員會亦關切地方主管機關需要額外 的人力和經費，才能落實《幼兒教育及照顧法》第 7 條。"}, {"co_id": "CRC2-CO49", "cycle": 2, "co_paragraph": "49", "text_zh": "委員會讚賞政府長期致力於為兒少提供有關性健康 及生殖健康的有 效教育。然而，許多兒少 及非政府組織對該教育的可用性及內容表 示關切；性傳染疾病的發生率仍然很高，在某些情況下還在持續增 加；且仍有相當數量的少女懷孕。"}, {"co_id": "CRC2-CO50", "cycle": 2, "co_paragraph": "50", "text_zh": "委員會重申其 2017 年建議政府對當前的性健康課程進行獨立審查的 意見，以決定是否需要進行任何修改以提高其有效性。所指審查係 為確保課綱： (1) 符合聯合國經濟、社會及文化權利委員會第 22 號一般性意見關於少 年性健康與生殖健康的建議，以及聯合國兒童權利委員會關於少年 健康與發展的第 4 號一般性意見（GC 4）以及關於少年權利的第 20 號一般性意見（GC 20）； (2) 適齡且具實證基礎； (3) 與兒少共同設計，符合《CRC》第 12 條規定，確保有效保護所有 兒少性健康及生殖健康權，包括 LGBTI 及身心障礙兒少； (4) 提供相關資訊，包括：相互尊重的關係、同意權、以及在兒少從事 任何性活動之前的充權及保護措施； (5) 對於懷孕兒少可使用的支持服務，提供適當資訊；及 (6) 考量父母（監護人）的意見，並教育他們有關兒少性健康及生殖健 康權的意義及重要性。 環境、氣候變遷與健康"}, {"co_id": "CRC2-CO51", "cycle": 2, "co_paragraph": "51", "text_zh": "委員會指出，兒少對環境品質 及氣候變遷，及其對其健康的潛在負 面影響表示擔憂。因此，委員會欣見政府在其《 2022-2024 年國家 人權行動計畫》中承諾處理氣候變遷對人權的影響。 委員會也建議 政府： (1) 採取特別措施以評估環境及氣候變遷對兒少權利的影響，包括 檢視 行政院環境保護署的任務，以確保其有考量到這些影響； (2) 採取步驟以確保在制定因應氣候變遷影響的措施時，兒少能有效參 與，以符合《CRC》第 12 條規定；及 (3) 以待決的聯合國兒童權利委員會關於兒童權利及氣候變遷的第 26 號 一般性意見為指引，制定此類措施。 LGBTI 兒少"}, {"co_id": "CRC2-CO52", "cycle": 2, "co_paragraph": "52", "text_zh": "委員會欣見政府在其《 2022-2024 年國家人權行動計畫》中承諾促 進 LGBTI 族群（包括兒少在內）的平等與不歧視。委員會敦促政府 徵詢 LGBTI 兒少意見，確保他們能夠獲得所有必要與適當的醫療 及其他支持服務，使他們能夠享受《CRC》規定的所有權利。 九、教育休閒與文化活動（第 28 條至第 31 條） 幼兒教育"}, {"co_id": "CRC2-CO53", "cycle": 2, "co_paragraph": "53", "text_zh": "委員會認知到政府付出相當大的努力增加幼兒接受學前教育機會。 委員會建議政府擴大努力，確保兒童接受優質的幼兒教育，特別是 確保所有幼兒教育工作者接受兒童權利方面的訓練，並檢視及降低 目前的工作人員與兒童的比例。 課程綱要"}, {"co_id": "CRC2-CO54", "cycle": 2, "co_paragraph": "54", "text_zh": "委員會讚賞政府實現課程多樣化的目標，包括引入《 108 課綱》 （以下簡稱新課綱）。委員會關切的是，兒少報告提到許多學校繼 續在狹隘的科目範圍內優先考慮學業成績，且不全然遵守新課綱的 要求。委員會建議： (1) 政府檢視其監督及查核新課 綱實施狀況的系統，特別是確保蒐集及 處理兒少對新課綱的體驗與看法；及 (2) 研究有關國家考試對兒少享有《 CRC》第 29 條及聯合國兒童權利 委員會第 1 號一般性意見教育權利的影響，且這項研究應有兒少參 與其中。 人權教育"}, {"co_id": "CRC2-CO55", "cycle": 2, "co_paragraph": "55", "text_zh": "委員會欣見政府目前為確保所有兒少在學校認識人權所做的努力。 委員會建議這些努力要特別聚 焦在兒少權利上，讓兒少能將這些權 利運用在他們的日常生活，同時檢視學校的政策及措施，確保其符 合兒少權利。 學校與課外活動中的身體、情緒及心理虐待"}, {"co_id": "CRC2-CO56", "cycle": 2, "co_paragraph": "56", "text_zh": "委員會認知到政府已將霸凌的定義擴及包括教師霸凌學生。然而， 委員會深感關切：兒少仍然持續報告他們在學校與 課後活動中遭受 身體、情緒 及 心 理 虐 待 ， 包 括 言 語 虐 待 。 現 有 制 度 不 符 合 《CRC》，其中教師的懲處與個別兒少受到影響的嚴重程度關連， 並且需要兒少及其家人自行舉證 。委員會強烈敦促政府將其替換為 提供明確指導的法規，指出何為構成暴力、殘忍及有辱人格的待 遇，並符合聯合國兒童權利委員會第 8 號與第 13 號一般性意見中之 定義。從事兒少工作的教師與其他人如有是類行為， 無論對個別兒 少的後果為何，都應受到懲處，並在適當情況下受到刑事起訴。 學校服儀規定"}, {"co_id": "CRC2-CO64", "cycle": 2, "co_paragraph": "64", "text_zh": "製造、販賣或運輸非法毒品的兒少被起訴，如果罪名成立，最高可 判處 4 年有期徒刑。委員會建議政府採取一切適當措施，包括在必 要時修法，以確保對於從事製造、販賣或運輸非法毒品的兒少，改 以罰金刑及轉向處遇等替代處分，剝奪自由應為最後手段。 觸法兒少"}, {"co_id": "CRC2-CO65", "cycle": 2, "co_paragraph": "65", "text_zh": "委員會欣見政府依據首次結論性意見修正《少年事件處理法》，意 指廢除少年虞犯（身分 罪），且未滿 12 歲兒童犯罪不會被起訴。 依據《少年事件處理法》，未滿 18 歲少年觸法行為得以少年保護事 件或少年刑事案件處理。然而，委員會關切的是，這可能意指依據 《少年事件處理法》判刑的 12 歲或 13 歲兒少會被收容在少年觀護 所。委員會建議政府修正《少年事件處理法》，確保不起訴未滿 14 歲的兒少。"}, {"co_id": "CRC2-CO66", "cycle": 2, "co_paragraph": "66", "text_zh": "委員會注意到政府機關在會議過程中所提供的資訊，對於父母(監護 人)探視矯正機關的兒少是沒有任何限制的。然而， 委員會關切的 是，這些機關自己設置的規定，可能導致家人探視的限制或歧視。 關於家人探視兒少與透過電話及 (或)社群媒體（social media ）連絡 的政策，委員會鼓勵政府提供矯正機關一套相關規定。對於入監服 刑的少年也應有類似規定。"}, {"co_id": "CRC2-CO67", "cycle": 2, "co_paragraph": "67", "text_zh": "委員會建議，收容兒少使其 與父母(監護人)分離均能採取《 CRC》 第 25 條的定期評估，特別注意兒少與父母(監護人)團聚的可能性。 修復式司法"}, {"co_id": "CRC2-CO68", "cycle": 2, "co_paragraph": "68", "text_zh": "《少年事件處理法》提供少年法庭為兒少尋求外部組織提供修復式 司法的可能性。 委員會鼓勵政府儘快實施，成為少年法庭選項之 一，並使修復式司法能整合為兒少司法的一部分。 買賣兒童、性剝削及性虐待兒童"}, {"co_id": "CRC2-CO69", "cycle": 2, "co_paragraph": "69", "text_zh": "委員會注意到，政府採取措施處理網路散播性虐待影像問題的過程 中，已融入 OPSC 任擇議定書及 CRC 對兒童賣淫及色情相關規定。 委員會建議政府制定一個綜合性的政策，包括《CRC》一般性原則 的執行，以防止對兒少的買賣及性剝削，該政策應符合聯合國兒童 權利委員會在其 OPSC 實施指南中提出的所有建議。 十一、公約任擇議定書的通過及採納 關於買賣兒童、兒童賣淫及兒童色情問題之任擇議定書 (OPSC) 及關於 兒童捲入武裝衝突之任擇議定書 (OPAC)"}, {"co_id": "CRC2-CO70", "cycle": 2, "co_paragraph": "70", "text_zh": "委員會注意到政府已努力 將 OPSC 融入現行相關法令及措施 。然 而，委員會建議政府對所有法規進行檢視，以確保完全遵守 OPSC 及 OPAC 規定的義務。 肆、執行及報告 一、追蹤"}, {"co_id": "CRC2-CO71", "cycle": 2, "co_paragraph": "71", "text_zh": "委員會建議政府採取一切適當措施，確保結論性意見完全落實，並 向兒少，包括不利處境兒少都能廣泛宣傳。並建議以國家語言廣泛 宣傳第二次定期報告、問題清單的答復及本結論性意見。"}], "esrs": []}, {"crc_id": "CRC-34", "no": 34, "name_zh": "性剝削保護(同上)", "name_en": "", "text_zh": "", "plain_zh": "", "cluster": "", "gcs": [], "pis": ["PI-06", "PI-07", "PI-08"], "cos": [{"co_id": "CRC1-CO29", "cycle": 1, "co_paragraph": "29", "text_zh": "委員會注意到，有關保護兒少之立法和民法，皆要求法院或其他 單位的決定應以兒少最佳利益為基礎。委員會建議此權利如下： （1） 符合聯合國兒童權利委員會第 14 號一般性意見有關兒少最 佳利益的解釋； （2） 在所有立法、行政和司法訴訟程序與決定，以及和兒童相關 並對其產生影響的所有政策、方案和計畫，包括移民和少年 司法的法律、法規中，整全性並一貫地落實。 生命、生存及發展權（第 6 條）"}, {"co_id": "CRC1-CO30", "cycle": 1, "co_paragraph": "30", "text_zh": "委員會注意到國家承認兒少的高自殺率及自殺企圖，並建議政府 評估及處理導致兒少自殺的因素，且加強現行降低兒少高自殺率 的努力。 兒少表意權（第 12 條）"}, {"co_id": "CRC1-CO31", "cycle": 1, "co_paragraph": "31", "text_zh": "委員會欣見學校及地方政府委員會納入兒少代表，尤其讚賞課綱 審議會納入兒少參與。然而，委員會關注持續限制兒少在家庭、 學校及社區自由、安全地發聲的社會文化氛圍。"}, {"co_id": "CRC1-CO32", "cycle": 1, "co_paragraph": "32", "text_zh": "委員會摯盼政府關注聯合國兒童權利委員會第 12 號一般性意見 所列兒少陳述意見的權利，並建議政府依據第 12 條公約採取措 施，以加強落實該權利。委員會建議政府： （1） 進行研究，確認對於兒少最重要之議題，以及在各種場合如 何使兒少意見被聽取； （2） 針對父母、教師、社工、法官及其他從事兒少工作者，辦理 教育訓練及認知提升活動，以有效促進兒少在家庭、學校及 社區的參與； （3） 於立法決策階段建立兒少表意機制， 藉此強化國家層級的兒 少參與； （4） 採取有效的法規措施，包含告知兒少有陳述意見的權利、保 障兒少有意義地行使該權利等，以確保兒少於行政及立法程 序陳述意見之權利。 四、 公民權與自由 取得國籍權（第 7 條第 1 項）"}, {"co_id": "CRC1-CO33", "cycle": 1, "co_paragraph": "33", "text_zh": "委員會欣見政府作出努力，讓更多未被收養的無國籍兒童取得中 華民國（臺灣）國籍。委員會關注到在某些報告中，提及生父不 詳且外籍生母已返回原屬國之兒少的權利及身分問題，並建議政 府採取適當措施，確保這些兒少不會淪為無國籍人，也不會無法 享有與臺灣兒童相同的服務與利益。 表現自由（第 13 條）"}, {"co_id": "CRC1-CO34", "cycle": 1, "co_paragraph": "34", "text_zh": "委員會關注部分報告提及表現自由在實踐上可能受到限制，尤其 在校園中，因為成人對此抱持消極態度且兒少害怕受到懲罰。委 員會建議政府確保兒少在所有情形下都能享有表現自由，並促進 支持之，例如促進支持在校內外發行散布報紙、刊物或其他出版 品。 集會結社及和平集會自由（第 15 條）"}, {"co_id": "CRC1-CO35", "cycle": 1, "co_paragraph": "35", "text_zh": "委員會關切未滿 20 歲的兒少及青年無法自行成立團體，只能在 父母或監護人同意下加入現存團體。此與兒少結社自由權不符， 也缺少對兒少發展能力的尊重。"}, {"co_id": "CRC1-CO36", "cycle": 1, "co_paragraph": "36", "text_zh": "委員會建議政府採取立法及其他必要的措施，確保兒少依據其年 齡、成熟度及發展能力，享有不受任何歧視的結社自由、和平集 會的自由並包括和平抗議的自由。 隱私權（第 16 條）"}, {"co_id": "CRC1-CO37", "cycle": 1, "co_paragraph": "37", "text_zh": "委員會關切有報告提到，老師以不是法律所規定的理由，搜查學 生個人物品，甚而洩漏學生的秘密。委員會建議政府採取一切必 要措施，避免學生隱私受到非法、恣意的侵犯。老師們應該被告 知這類保障隱私的法令，而且當老師們違反法令時，必須受到懲 處。 不受酷刑或其他形式殘忍、不人道或有辱人格待遇或處罰之權利（第 37 條第 1 項（a）款）"}, {"co_id": "CRC1-CO64", "cycle": 1, "co_paragraph": "64", "text_zh": "委員會欣見政府為解決兒童肥胖問題所採取的一系列措施，但建 議： （1） 政府評估及監測這些措施的成效； （2） 在學校量測兒童體重時應審慎進行， 確保過程保護兒童隱私 且不會使兒童受到羞辱。"}, {"co_id": "CRC1-CO65", "cycle": 1, "co_paragraph": "65", "text_zh": "委員會指出，政府自 2011 年起採行逐步全面性推動整體兒少性 教育及生育保健計畫（包括教材、課程、方案及活動等）。委員會 亦指出，多個 NGO 對其成效及合宜性表達強烈關切，性傳染病 發生率仍高、部分疾病發生率正在增加，且仍有相當比例的青少 年懷孕。"}, {"co_id": "CRC1-CO66", "cycle": 1, "co_paragraph": "66", "text_zh": "委員會建議政府檢討現行計畫內容，評估是否需修訂以改善其成 效及確保其合宜性 。 檢討過程應諮詢所有利害關係人，包括兒少、 家長團體、衛生專業人員和教育工作者。"}, {"co_id": "CRC1-CO67", "cycle": 1, "co_paragraph": "67", "text_zh": "委員會進一步建議審查評估現行的性健康和生育保健計畫是否： （1） 與經濟社會和文化權利委員會第 22 號一般性意見（關於少 年性健康與生育保健） 、聯合國兒童權利委員會第 4 號一般 性意見（關於少年健康與發展）及第 20 號一般性意見（關 於兒少權利）的內容一致； （2） 適齡且具實證基礎； （3） 旨在保護所有兒少的性健康和生育保健權，包括 LGBTI 兒 少及身心障礙兒少； （4） 符合《CRC》第12 條規定，於方案設計、實施及評估時納入 兒少意見； （5） 在兒少發生性行為之前，提供兒少親密關係應互相尊重等相 關資訊，並培養兒少對於性行為的正確觀念； （6） 為懷孕少女提供適當的資訊及支持服務； （7） 教導父母瞭解兒少的性健康及生育保健相關權利。"}, {"co_id": "CRC1-CO68", "cycle": 1, "co_paragraph": "68", "text_zh": "委員會聽到兒少代表對環境品質以及可能損害其健康的擔憂。委 員會建議政府採取措施監測環境對兒少健康的影響，也建議政府 建立相關制度或流程，使兒少得以向政府表達對環境或其他兒少 健康議題之關切，並參考聯合國兒童權利委員會繼 2016 年關於 兒少權利與環境之一般性討論所提出的建議，將兒少所表示的意 見納入適當的立法或行動中。 八、 教育休閒與文化活動（第 28 條至第 31 條） 教育權（第 28 條、第 29 條） 改善就學負擔差距"}, {"co_id": "CRC1-CO69", "cycle": 1, "co_paragraph": "69", "text_zh": "委員會欣見 6 至 15 歲的義務教育免收學費。然而，委員會關切 越來越多私立高中職學生須申請貸款才能負擔學費、其他學習費 用及生活開支。"}, {"co_id": "CRC1-CO70", "cycle": 1, "co_paragraph": "70", "text_zh": "委員會建議教育部全面檢視私立高中職收費情形，並建立審查機 制，以保護經濟弱勢學生免受私立學校過度收費。委員會進一步 建議政府推行適當計畫，協助無力償還貸款的學生。 學前教育"}, {"co_id": "CRC1-CO71", "cycle": 1, "co_paragraph": "71", "text_zh": "委員會對於公立和非營利幼兒園不足、就讀私立幼兒園帶給家長 的沉重經濟負擔表達關切。委員會亦關切地方主管機關需要額外 的人力和經費，才能落實《幼兒教育及照顧法》第 7 條。"}, {"co_id": "CRC2-CO29", "cycle": 2, "co_paragraph": "29", "text_zh": "委員會欣見政府在《 2022-2024 年國家人權行動計畫》中承諾在數 位環境下保護人權，包括兒少權利。委員會亦欣見政府提出 《媒體 素養教育白皮書》以及對偏鄉學校數位優先原則的承諾。 委員會建 議政府在實施有關數位人權的計畫時： (1) 將聯合國兒童權利委員會第 25 號一般性意見關於數位環境中的兒少 權利納入考量；及 (2) 促進有效的兒少參與以符合《CRC》第 12 條。 集會及結社自由"}, {"co_id": "CRC2-CO30", "cycle": 2, "co_paragraph": "30", "text_zh": "委員會關注到政府對兒少加入與組織社團以及參加公共集會能力的 擔憂。委員會建議政府審查所有相關立法，包括《社會團體法》 及 《集會遊行法》，以確保其符合《 CRC》第 15 條有關兒少自由結 社及和平集會的權利。 五、保護兒少免受暴力侵害（第 19 條、第 24 條第 3 款、第 28 條第 2 款、第 34 條、第 37 條（a）項及第 39 條） 虐待與疏忽法律定義"}, {"co_id": "CRC2-CO31", "cycle": 2, "co_paragraph": "31", "text_zh": "委員會肯定政府以法律及解釋文件定義虐待及疏忽之努力。 委員會 建議參照聯合國兒童權利委員會第 8 號及第 13 號一般性意見檢視虐 待及疏忽的定義。委員會也建議將之運用在未來行動上，包含數據 蒐集及影響評估。 暴力根本原因分析及通報"}, {"co_id": "CRC2-CO32", "cycle": 2, "co_paragraph": "32", "text_zh": "委員會注意到政府對於全面預防暴力的努力，但關注暴力持續發生 的現象，尤其是學校。委員會建議政府持續投入教師、社會工作人 員及其他處理兒少事務專業人員的教育訓練。委員會也建議政府鼓 勵更多關於暴力根本原因分析之研究，以及暴力發生事件被通報的 占比。 數位環境下的暴力"}, {"co_id": "CRC2-CO33", "cycle": 2, "co_paragraph": "33", "text_zh": "政府已開始處理性暴力各方面的立法及實際行動，包含數位環境。 然而，委員會關心學校與安置機構兒少性虐待案件增加。 委員會建 議政府為執行《兒童及少年性剝削防制條例 》發展處理數位環境性 暴力的機制，並投入人力與預算資源，以保護兒少權益。 保護受害及目睹犯罪兒少"}, {"co_id": "CRC2-CO34", "cycle": 2, "co_paragraph": "34", "text_zh": "為發展受害及目睹犯罪兒少之協調系統，政府已建立非常周延的合 作機制：《重大兒童及少年虐待司法早期介入三方合作流程》，然 而，委員會關切此機制的執行及成效。 委員會建議針對此機制建立 常規的定期評估。委員會建議政府思考建置 Barnahus（兒童 之 家），它是個專門晤談受害及目睹犯罪兒少之機構 ，並配置適當合 格的專業人員處理。 9"}, {"co_id": "CRC2-CO35", "cycle": 2, "co_paragraph": "35", "text_zh": "政府已經在法律及實務方面為受害及目睹犯罪兒少提供很多復歸社 會的措施，但尚未看到成果。 委員會建議政府密切追蹤這些法律及 行政措施的成效，並進行資料分析，確保受害及目睹犯罪兒少能復 歸社會。 六、家庭環境與替代性照顧(第 5 條、第 9 條至第 11 條、第 18 條第 1 及 2 項、第 20 條、第 21 條、第 25 條及第 27 條第 4 項) 無法在家庭環境中成長的兒少/替代性照顧"}, {"co_id": "CRC2-CO36", "cycle": 2, "co_paragraph": "36", "text_zh": "委員會讚賞政府所提出的兒少替代性照顧政策，這份政策中所發現 的問題、解決策略及目標都很重要。委員會格外欣見政策的重點有 放在預防替代性照顧所需要的資源上。 委員會建議應特別關注身心 障礙兒少的家庭，使其 能給予身心障礙兒少適當的照顧，包括促成 及協助這些父母（監護人）的自助團體，必要時，應提供喘息服 務。"}, {"co_id": "CRC2-CO37", "cycle": 2, "co_paragraph": "37", "text_zh": "委員會欣見政府已規劃將團體家庭納入法定的替代性照顧資源，因 此，當住宿式照顧被視為兒少最佳利益時，能優先考量安置在團體 家庭的照顧環境，而非大型的安置機構。 委員會建議政府應配置適 當的資源以執行這項目標。"}, {"co_id": "CRC2-CO64", "cycle": 2, "co_paragraph": "64", "text_zh": "製造、販賣或運輸非法毒品的兒少被起訴，如果罪名成立，最高可 判處 4 年有期徒刑。委員會建議政府採取一切適當措施，包括在必 要時修法，以確保對於從事製造、販賣或運輸非法毒品的兒少，改 以罰金刑及轉向處遇等替代處分，剝奪自由應為最後手段。 觸法兒少"}, {"co_id": "CRC2-CO65", "cycle": 2, "co_paragraph": "65", "text_zh": "委員會欣見政府依據首次結論性意見修正《少年事件處理法》，意 指廢除少年虞犯（身分 罪），且未滿 12 歲兒童犯罪不會被起訴。 依據《少年事件處理法》，未滿 18 歲少年觸法行為得以少年保護事 件或少年刑事案件處理。然而，委員會關切的是，這可能意指依據 《少年事件處理法》判刑的 12 歲或 13 歲兒少會被收容在少年觀護 所。委員會建議政府修正《少年事件處理法》，確保不起訴未滿 14 歲的兒少。"}, {"co_id": "CRC2-CO66", "cycle": 2, "co_paragraph": "66", "text_zh": "委員會注意到政府機關在會議過程中所提供的資訊，對於父母(監護 人)探視矯正機關的兒少是沒有任何限制的。然而， 委員會關切的 是，這些機關自己設置的規定，可能導致家人探視的限制或歧視。 關於家人探視兒少與透過電話及 (或)社群媒體（social media ）連絡 的政策，委員會鼓勵政府提供矯正機關一套相關規定。對於入監服 刑的少年也應有類似規定。"}, {"co_id": "CRC2-CO67", "cycle": 2, "co_paragraph": "67", "text_zh": "委員會建議，收容兒少使其 與父母(監護人)分離均能採取《 CRC》 第 25 條的定期評估，特別注意兒少與父母(監護人)團聚的可能性。 修復式司法"}, {"co_id": "CRC2-CO68", "cycle": 2, "co_paragraph": "68", "text_zh": "《少年事件處理法》提供少年法庭為兒少尋求外部組織提供修復式 司法的可能性。 委員會鼓勵政府儘快實施，成為少年法庭選項之 一，並使修復式司法能整合為兒少司法的一部分。 買賣兒童、性剝削及性虐待兒童"}, {"co_id": "CRC2-CO69", "cycle": 2, "co_paragraph": "69", "text_zh": "委員會注意到，政府採取措施處理網路散播性虐待影像問題的過程 中，已融入 OPSC 任擇議定書及 CRC 對兒童賣淫及色情相關規定。 委員會建議政府制定一個綜合性的政策，包括《CRC》一般性原則 的執行，以防止對兒少的買賣及性剝削，該政策應符合聯合國兒童 權利委員會在其 OPSC 實施指南中提出的所有建議。 十一、公約任擇議定書的通過及採納 關於買賣兒童、兒童賣淫及兒童色情問題之任擇議定書 (OPSC) 及關於 兒童捲入武裝衝突之任擇議定書 (OPAC)"}, {"co_id": "CRC2-CO70", "cycle": 2, "co_paragraph": "70", "text_zh": "委員會注意到政府已努力 將 OPSC 融入現行相關法令及措施 。然 而，委員會建議政府對所有法規進行檢視，以確保完全遵守 OPSC 及 OPAC 規定的義務。 肆、執行及報告 一、追蹤"}, {"co_id": "CRC2-CO71", "cycle": 2, "co_paragraph": "71", "text_zh": "委員會建議政府採取一切適當措施，確保結論性意見完全落實，並 向兒少，包括不利處境兒少都能廣泛宣傳。並建議以國家語言廣泛 宣傳第二次定期報告、問題清單的答復及本結論性意見。"}], "esrs": [{"report_id": "ESR-2022-CRRC", "year": 2022, "ngo_name": "台灣兒童權利公約聯盟", "focus_articles": "[4, 6, 12, 19, 20, 24, 27, 31, 34, 37, 40]"}, {"report_id": "ESR-2022-GOH", "year": 2022, "ngo_name": "勵馨基金會", "focus_articles": "[19, 34, 35, 39]"}, {"report_id": "ESR-2022-ECPAT", "year": 2022, "ngo_name": "台灣展翅協會 (ECPAT Taiwan)", "focus_articles": "[34, 35, 36]"}, {"report_id": "ESR-2022-TWRF", "year": 2022, "ngo_name": "婦女救援基金會", "focus_articles": "[19, 34, 35, 36, 39]"}]}, {"crc_id": "CRC-35", "no": 35, "name_zh": "防止販運", "name_en": "", "text_zh": "", "plain_zh": "", "cluster": "", "gcs": [], "pis": ["PI-07"], "cos": [{"co_id": "CRC1-CO64", "cycle": 1, "co_paragraph": "64", "text_zh": "委員會欣見政府為解決兒童肥胖問題所採取的一系列措施，但建 議： （1） 政府評估及監測這些措施的成效； （2） 在學校量測兒童體重時應審慎進行， 確保過程保護兒童隱私 且不會使兒童受到羞辱。"}, {"co_id": "CRC1-CO65", "cycle": 1, "co_paragraph": "65", "text_zh": "委員會指出，政府自 2011 年起採行逐步全面性推動整體兒少性 教育及生育保健計畫（包括教材、課程、方案及活動等）。委員會 亦指出，多個 NGO 對其成效及合宜性表達強烈關切，性傳染病 發生率仍高、部分疾病發生率正在增加，且仍有相當比例的青少 年懷孕。"}, {"co_id": "CRC1-CO66", "cycle": 1, "co_paragraph": "66", "text_zh": "委員會建議政府檢討現行計畫內容，評估是否需修訂以改善其成 效及確保其合宜性 。 檢討過程應諮詢所有利害關係人，包括兒少、 家長團體、衛生專業人員和教育工作者。"}, {"co_id": "CRC1-CO67", "cycle": 1, "co_paragraph": "67", "text_zh": "委員會進一步建議審查評估現行的性健康和生育保健計畫是否： （1） 與經濟社會和文化權利委員會第 22 號一般性意見（關於少 年性健康與生育保健） 、聯合國兒童權利委員會第 4 號一般 性意見（關於少年健康與發展）及第 20 號一般性意見（關 於兒少權利）的內容一致； （2） 適齡且具實證基礎； （3） 旨在保護所有兒少的性健康和生育保健權，包括 LGBTI 兒 少及身心障礙兒少； （4） 符合《CRC》第12 條規定，於方案設計、實施及評估時納入 兒少意見； （5） 在兒少發生性行為之前，提供兒少親密關係應互相尊重等相 關資訊，並培養兒少對於性行為的正確觀念； （6） 為懷孕少女提供適當的資訊及支持服務； （7） 教導父母瞭解兒少的性健康及生育保健相關權利。"}, {"co_id": "CRC1-CO68", "cycle": 1, "co_paragraph": "68", "text_zh": "委員會聽到兒少代表對環境品質以及可能損害其健康的擔憂。委 員會建議政府採取措施監測環境對兒少健康的影響，也建議政府 建立相關制度或流程，使兒少得以向政府表達對環境或其他兒少 健康議題之關切，並參考聯合國兒童權利委員會繼 2016 年關於 兒少權利與環境之一般性討論所提出的建議，將兒少所表示的意 見納入適當的立法或行動中。 八、 教育休閒與文化活動（第 28 條至第 31 條） 教育權（第 28 條、第 29 條） 改善就學負擔差距"}, {"co_id": "CRC1-CO69", "cycle": 1, "co_paragraph": "69", "text_zh": "委員會欣見 6 至 15 歲的義務教育免收學費。然而，委員會關切 越來越多私立高中職學生須申請貸款才能負擔學費、其他學習費 用及生活開支。"}, {"co_id": "CRC1-CO70", "cycle": 1, "co_paragraph": "70", "text_zh": "委員會建議教育部全面檢視私立高中職收費情形，並建立審查機 制，以保護經濟弱勢學生免受私立學校過度收費。委員會進一步 建議政府推行適當計畫，協助無力償還貸款的學生。 學前教育"}, {"co_id": "CRC1-CO71", "cycle": 1, "co_paragraph": "71", "text_zh": "委員會對於公立和非營利幼兒園不足、就讀私立幼兒園帶給家長 的沉重經濟負擔表達關切。委員會亦關切地方主管機關需要額外 的人力和經費，才能落實《幼兒教育及照顧法》第 7 條。"}, {"co_id": "CRC2-CO64", "cycle": 2, "co_paragraph": "64", "text_zh": "製造、販賣或運輸非法毒品的兒少被起訴，如果罪名成立，最高可 判處 4 年有期徒刑。委員會建議政府採取一切適當措施，包括在必 要時修法，以確保對於從事製造、販賣或運輸非法毒品的兒少，改 以罰金刑及轉向處遇等替代處分，剝奪自由應為最後手段。 觸法兒少"}, {"co_id": "CRC2 依據 《少年事件處理法》判刑的 12 歲或 13 歲兒少會被收容在少年觀護 所。委員會建議政府修正《少年事件處理法》，確保不起訴未滿 14 歲的兒少。"}, {"co_id": "CRC2-CO66", "cycle": 2, "co_paragraph": "66", "text_zh": "委員會注意到政府機關在會議過程中所提供的資訊，對於父母(監護 人)探視矯正機關的兒少是沒有任何限制的。然而， 委員會關切的 是，這些機關自己設置的規定，可能導致家人探視的限制或歧視。 關於家人探視兒少與透過電話及 (或)社群媒體（social media ）連絡 的政策，委員會鼓勵政府提供矯正機關一套相關規定。對於入監服 刑的少年也應有類似規定。"}, {"co_id": "CRC2-CO67", "cycle": 2, "co_paragraph": "67", "text_zh": "委員會建議，收容兒少使其 與父母(監護人)分離均能採取《 CRC》 第 25 條的定期評估，特別注意兒少與父母(監護人)團聚的可能性。 修復式司法"}, {"co_id": "CRC2-CO68", "cycle": 2, "co_paragraph": "68", "text_zh": "《少年事件處理法》提供少年法庭為兒少尋求外部組織提供修復式 司法的可能性。 委員會鼓勵政府儘快實施，成為少年法庭選項之 一，並使修復式司法能整合為兒少司法的一部分。 買賣兒童、性剝削及性虐待兒童"}, {"co_id": "CRC2-CO69", "cycle": 2, "co_paragraph": "69", "text_zh": "委員會注意到，政府採取措施處理網路散播性虐待影像問題的過程 中，已融入 OPSC 任擇議定書及 CRC 對兒童賣淫及色情相關規定。 委員會建議政府制定一個綜合性的政策，包括《CRC》一般性原則 的執行，以防止對兒少的買賣及性剝削，該政策應符合聯合國兒童 權利委員會在其 OPSC 實施指南中提出的所有建議。 十一、公約任擇議定書的通過及採納 關於買賣兒童、兒童賣淫及兒童色情問題之任擇議定書 (OPSC) 及關於 兒童捲入武裝衝突之任擇議定書 (OPAC)"}, {"co_id": "CRC2-CO70", "cycle": 2, "co_paragraph": "70", "text_zh": "委員會注意到政府已努力 將 OPSC 融入現行相關法令及措施 。然 而，委員會建議政府對所有法規進行檢視，以確保完全遵守 OPSC 及 OPAC 規定的義務。 肆、執行及報告 一、追蹤"}, {"co_id": "CRC2-CO71", "cycle": 2, "co_paragraph": "71", "text_zh": "委員會建議政府採取一切適當措施，確保結論性意見完全落實，並 向兒少，包括不利處境兒少都能廣泛宣傳。並建議以國家語言廣泛 宣傳第二次定期報告、問題清單的答復及本結論性意見。"}], "esrs": [{"report_id": "ESR-2022-ECPAT", "year": 2022, "ngo_name": "台灣展翅協會 (ECPAT Taiwan)", "focus_articles": "[34, 35, 36]"}, {"report_id": "ESR-2022-TWRF", "year": 2022, "ngo_name": "婦女救援基金會", "focus_articles": "[19, 34, 35, 36, 39]"}]}, {"crc_id": "CRC-37", "no": 37, "name_zh": "不人道對待禁止", "name_en": "", "text_zh": "", "plain_zh": "就算你犯錯,警察、法官也不能虐待你、用酷刑;不能把你和大人關在一起;不能讓你被永遠關起來。", "cluster": "", "gcs": [], "pis": ["PI-03", "PI-05"], "cos": [{"co_id": "CRC1-CO29", "cycle": 1, "co_paragraph": "29", "text_zh": "委員會注意到，有關保護兒少之立法和民法，皆要求法院或其他 單位的決定應以兒少最佳利益為基礎。委員會建議此權利如下： （1） 符合聯合國兒童權利委員會第 14 號一般性意見有關兒少最 佳利益的解釋； （2） 在所有立法、行政和司法訴訟程序與決定，以及和兒童相關 並對其產生影響的所有政策、方案和計畫，包括移民和少年 司法的法律、法規中，整全性並一貫地落實。 生命、生存及發展權（第 6 條）"}, {"co_id": "CRC1-CO30", "cycle": 1, "co_paragraph": "30", "text_zh": "委員會注意到國家承認兒少的高自殺率及自殺企圖，並建議政府 評估及處理導致兒少自殺的因素，且加強現行降低兒少高自殺率 的努力。 兒少表意權（第 12 條）"}, {"co_id": "CRC1-CO31", "cycle": 1, "co_paragraph": "31", "text_zh": "委員會欣見學校及地方政府委員會納入兒少代表，尤其讚賞課綱 審議會納入兒少參與。然而，委員會關注持續限制兒少在家庭、 學校及社區自由、安全地發聲的社會文化氛圍。"}, {"co_id": "CRC1-CO32", "cycle": 1, "co_paragraph": "32", "text_zh": "委員會摯盼政府關注聯合國兒童權利委員會第 12 號一般性意見 所列兒少陳述意見的權利，並建議政府依據第 12 條公約採取措 施，以加強落實該權利。委員會建議政府： （1） 進行研究，確認對於兒少最重要之議題，以及在各種場合如 何使兒少意見被聽取； （2） 針對父母、教師、社工、法官及其他從事兒少工作者，辦理 教育訓練及認知提升活動，以有效促進兒少在家庭、學校及 社區的參與； （3） 於立法決策階段建立兒少表意機制， 藉此強化國家層級的兒 少參與； （4） 採取有效的法規措施，包含告知兒少有陳述意見的權利、保 障兒少有意義地行使該權利等，以確保兒少於行政及立法程 序陳述意見之權利。 四、 公民權與自由 取得國籍權（第 7 條第 1 項）"}, {"co_id": "CRC1-CO33", "cycle": 1, "co_paragraph": "33", "text_zh": "委員會欣見政府作出努力，讓更多未被收養的無國籍兒童取得中 華民國（臺灣）國籍。委員會關注到在某些報告中，提及生父不 詳且外籍生母已返回原屬國之兒少的權利及身分問題，並建議政 府採取適當措施，確保這些兒少不會淪為無國籍人，也不會無法 享有與臺灣兒童相同的服務與利益。 表現自由（第 13 條）"}, {"co_id": "CRC1-CO34", "cycle": 1, "co_paragraph": "34", "text_zh": "委員會關注部分報告提及表現自由在實踐上可能受到限制，尤其 在校園中，因為成人對此抱持消極態度且兒少害怕受到懲罰。委 員會建議政府確保兒少在所有情形下都能享有表現自由，並促進 支持之，例如促進支持在校內外發行散布報紙、刊物或其他出版 品。 集會結社及和平集會自由（第 15 條）"}, {"co_id": "CRC1-CO35", "cycle": 1, "co_paragraph": "35", "text_zh": "委員會關切未滿 20 歲的兒少及青年無法自行成立團體，只能在 父母或監護人同意下加入現存團體。此與兒少結社自由權不符， 也缺少對兒少發展能力的尊重。"}, {"co_id": "CRC1-CO36", "cycle": 1, "co_paragraph": "36", "text_zh": "委員會建議政府採取立法及其他必要的措施，確保兒少依據其年 齡、成熟度及發展能力，享有不受任何歧視的結社自由、和平集 會的自由並包括和平抗議的自由。 隱私權（第 16 條）"}, {"co_id": "CRC1-CO37", "cycle": 1, "co_paragraph": "37", "text_zh": "委員會關切有報告提到，老師以不是法律所規定的理由，搜查學 生個人物品，甚而洩漏學生的秘密。委員會建議政府採取一切必 要措施，避免學生隱私受到非法、恣意的侵犯。老師們應該被告 知這類保障隱私的法令，而且當老師們違反法令時，必須受到懲 處。 不受酷刑或其他形式殘忍、不人道或有辱人格待遇或處罰之權利（第 37 條第 1 項（a）款）"}, {"co_id": "CRC1-CO64", "cycle": 1, "co_paragraph": "64", "text_zh": "委員會欣見政府為解決兒童肥胖問題所採取的一系列措施，但建 議： （1） 政府評估及監測這些措施的成效； （2） 在學校量測兒童體重時應審慎進行， 確保過程保護兒童隱私 且不會使兒童受到羞辱。"}, {"co_id": "CRC1-CO65", "cycle": 1, "co_paragraph": "65", "text_zh": "委員會指出，政府自 2011 年起採行逐步全面性推動整體兒少性 教育及生育保健計畫（包括教材、課程、方案及活動等）。委員會 亦指出，多個 NGO 對其成效及合宜性表達強烈關切，性傳染病 發生率仍高、部分疾病發生率正在增加，且仍有相當比例的青少 年懷孕。"}, {"co_id": "CRC1-CO66", "cycle": 1, "co_paragraph": "66", "text_zh": "委員會建議政府檢討現行計畫內容，評估是否需修訂以改善其成 效及確保其合宜性 。 檢討過程應諮詢所有利害關係人，包括兒少、 家長團體、衛生專業人員和教育工作者。"}, {"co_id": "CRC1-CO67", "cycle": 1, "co_paragraph": "67", "text_zh": "委員會進一步建議審查評估現行的性健康和生育保健計畫是否： （1） 與經濟社會和文化權利委員會第 22 號一般性意見（關於少 年性健康與生育保健） 、聯合國兒童權利委員會第 4 號一般 性意見（關於少年健康與發展）及第 20 號一般性意見（關 於兒少權利）的內容一致； （2） 適齡且具實證基礎； （3） 旨在保護所有兒少的性健康和生育保健權，包括 LGBTI 兒 少及身心障礙兒少； （4） 符合《CRC》第12 條規定，於方案設計、實施及評估時納入 兒少意見； （5） 在兒少發生性行為之前，提供兒少親密關係應互相尊重等相 關資訊，並培養兒少對於性行為的正確觀念； （6） 為懷孕少女提供適當的資訊及支持服務； （7） 教導父母瞭解兒少的性健康及生育保健相關權利。"}, {"co_id": "CRC1-CO68", "cycle": 1, "co_paragraph": "68", "text_zh": "委員會聽到兒少代表對環境品質以及可能損害其健康的擔憂。委 員會建議政府採取措施監測環境對兒少健康的影響，也建議政府 建立相關制度或流程，使兒少得以向政府表達對環境或其他兒少 健康議題之關切，並參考聯合國兒童權利委員會繼 2016 年關於 兒少權利與環境之一般性討論所提出的建議，將兒少所表示的意 見納入適當的立法或行動中。 八、 教育休閒與文化活動（第 28 條至第 31 條） 教育權（第 28 條、第 29 條） 改善就學負擔差距"}, {"co_id": "CRC1-CO69", "cycle": 1, "co_paragraph": "69", "text_zh": "委員會欣見 6 至 15 歲的義務教育免收學費。然而，委員會關切 越來越多私立高中職學生須申請貸款才能負擔學費、其他學習費 用及生活開支。"}, {"co_id": "CRC1-CO70", "cycle": 1, "co_paragraph": "70", "text_zh": "委員會建議教育部全面檢視私立高中職收費情形，並建立審查機 制，以保護經濟弱勢學生免受私立學校過度收費。委員會進一步 建議政府推行適當計畫，協助無力償還貸款的學生。 學前教育"}, {"co_id": "CRC1-CO71", "cycle": 1, "co_paragraph": "71", "text_zh": "委員會對於公立和非營利幼兒園不足、就讀私立幼兒園帶給家長 的沉重經濟負擔表達關切。委員會亦關切地方主管機關需要額外 的人力和經費，才能落實《幼兒教育及照顧法》第 7 條。"}, {"co_id": "CRC2-CO29", "cycle": 2, "co_paragraph": "29", "text_zh": "委員會欣見政府在《 2022-2024 年國家人權行動計畫》中承諾在數 位環境下保護人權，包括兒少權利。委員會亦欣見政府提出 《媒體 素養教育白皮書》以及對偏鄉學校數位優先原則的承諾。 委員會建 議政府在實施有關數位人權的計畫時： (1) 將聯合國兒童權利委員會第 25 號一般性意見關於數位環境中的兒少 權利納入考量；及 (2) 促進有效的兒少參與以符合《CRC》第 12 條。 集會及結社自由"}, {"co_id": "CRC2-CO30", "cycle": 2, "co_paragraph": "30", "text_zh": "委員會關注到政府對兒少加入與組織社團以及參加公共集會能力的 擔憂。委員會建議政府審查所有相關立法，包括《社會團體法》 及 《集會遊行法》，以確保其符合《 CRC》第 15 條有關兒少自由結 社及和平集會的權利。 五、保護兒少免受暴力侵害（第 19 條、第 24 條第 3 款、第 28 條第 2 款、第 34 條、第 37 條（a）項及第 39 條） 虐待與疏忽法律定義"}, {"co_id": "CRC2-CO31", "cycle": 2, "co_paragraph": "31", "text_zh": "委員會肯定政府以法律及解釋文件定義虐待及疏忽之努力。 委員會 建議參照聯合國兒童權利委員會第 8 號及第 13 號一般性意見檢視虐 待及疏忽的定義。委員會也建議將之運用在未來行動上，包含數據 蒐集及影響評估。 暴力根本原因分析及通報"}, {"co_id": "CRC2-CO32", "cycle": 2, "co_paragraph": "32", "text_zh": "委員會注意到政府對於全面預防暴力的努力，但關注暴力持續發生 的現象，尤其是學校。委員會建議政府持續投入教師、社會工作人 員及其他處理兒少事務專業人員的教育訓練。委員會也建議政府鼓 勵更多關於暴力根本原因分析之研究，以及暴力發生事件被通報的 占比。 數位環境下的暴力"}, {"co_id": "CRC2-CO33", "cycle": 2, "co_paragraph": "33", "text_zh": "政府已開始處理性暴力各方面的立法及實際行動，包含數位環境。 然而，委員會關心學校與安置機構兒少性虐待案件增加。 委員會建 議政府為執行《兒童及少年性剝削防制條例 》發展處理數位環境性 暴力的機制，並投入人力與預算資源，以保護兒少權益。 保護受害及目睹犯罪兒少"}, {"co_id": "CRC2-CO34", "cycle": 2, "co_paragraph": "34", "text_zh": "為發展受害及目睹犯罪兒少之協調系統，政府已建立非常周延的合 作機制：《重大兒童及少年虐待司法早期介入三方合作流程》，然 而，委員會關切此機制的執行及成效。 委員會建議針對此機制建立 常規的定期評估。委員會建議政府思考建置 Barnahus（兒童 之 家），它是個專門晤談受害及目睹犯罪兒少之機構 ，並配置適當合 格的專業人員處理。 9"}, {"co_id": "CRC2-CO35", "cycle": 2, "co_paragraph": "35", "text_zh": "政府已經在法律及實務方面為受害及目睹犯罪兒少提供很多復歸社 會的措施，但尚未看到成果。 委員會建議政府密切追蹤這些法律及 行政措施的成效，並進行資料分析，確保受害及目睹犯罪兒少能復 歸社會。 六、家庭環境與替代性照顧(第 5 條、第 9 條至第 11 條、第 18 條第 1 及 2 項、第 20 條、第 21 條、第 25 條及第 27 條第 4 項) 無法在家庭環境中成長的兒少/替代性照顧"}, {"co_id": "CRC2-CO36", "cycle": 2, "co_paragraph": "36", "text_zh": "委員會讚賞政府所提出的兒少替代性照顧政策，這份政策中所發現 的問題、解決策略及目標都很重要。委員會格外欣見政策的重點有 放在預防替代性照顧所需要的資源上。 委員會建議應特別關注身心 障礙兒少的家庭，使其 能給予身心障礙兒少適當的照顧，包括促成 及協助這些父母（監護人）的自助團體，必要時，應提供喘息服 務。"}, {"co_id": "CRC2-CO37", "cycle": 2, "co_paragraph": "37", "text_zh": "委員會欣見政府已規劃將團體家庭納入法定的替代性照顧資源，因 此，當住宿式照顧被視為兒少最佳利益時，能優先考量安置在團體 家庭的照顧環境，而非大型的安置機構。 委員會建議政府應配置適 當的資源以執行這項目標。"}, {"co_id": "CRC2-CO64", "cycle": 2, "co_paragraph": "64", "text_zh": "製造、販賣或運輸非法毒品的兒少被起訴，如果罪名成立，最高可 判處 4 年有期徒刑。委員會建議政府採取一切適當措施，包括在必 要時修法，以確保對於從事製造、販賣或運輸非法毒品的兒少，改 以罰金刑及轉向處遇等替代處分，剝奪自由應為最後手段。 觸法兒少"}, {"co_id": "CRC2-CO65", "cycle": 2, "co_paragraph": "65", "text_zh": "委員會欣見政府依據首次結論性意見修正《少年事件處理法》，意 指廢除少年虞犯（身分 罪），且未滿 12 歲兒童犯罪不會被起訴。 依據《少年事件處理法》，未滿 18 歲少年觸法行為得以少年保護事 件或少年刑事案件處理。然而，委員會關切的是，這可能意指依據 《少年事件處理法》判刑的 12 歲或 13 歲兒少會被收容在少年觀護 所。委員會建議政府修正《少年事件處理法》，確保不起訴未滿 14 歲的兒少。"}, {"co_id": "CRC2-CO66", "cycle": 2, "co_paragraph": "66", "text_zh": "委員會注意到政府機關在會議過程中所提供的資訊，對於父母(監護 人)探視矯正機關的兒少是沒有任何限制的。然而， 委員會關切的 是，這些機關自己設置的規定，可能導致家人探視的限制或歧視。 關於家人探視兒少與透過電話及 (或)社群媒體（social media ）連絡 的政策，委員會鼓勵政府提供矯正機關一套相關規定。對於入監服 刑的少年也應有類似規定。"}, {"co_id": "CRC2-CO67", "cycle": 2, "co_paragraph": "67", "text_zh": "委員會建議，收容兒少使其 與父母(監護人)分離均能採取《 CRC》 第 25 條的定期評估，特別注意兒少與父母(監護人)團聚的可能性。 修復式司法"}, {"co_id": "CRC2-CO68", "cycle": 2, "co_paragraph": "68", "text_zh": "《少年事件處理法》提供少年法庭為兒少尋求外部組織提供修復式 司法的可能性。 委員會鼓勵政府儘快實施，成為少年法庭選項之 一，並使修復式司法能整合為兒少司法的一部分。 買賣兒童、性剝削及性虐待兒童"}, {"co_id": "CRC2-CO69", "cycle": 2, "co_paragraph": "69", "text_zh": "委員會注意到，政府採取措施處理網路散播性虐待影像問題的過程 中，已融入 OPSC 任擇議定書及 CRC 對兒童賣淫及色情相關規定。 委員會建議政府制定一個綜合性的政策，包括《CRC》一般性原則 的執行，以防止對兒少的買賣及性剝削，該政策應符合聯合國兒童 權利委員會在其 OPSC 實施指南中提出的所有建議。 十一、公約任擇議定書的通過及採納 關於買賣兒童、兒童賣淫及兒童色情問題之任擇議定書 (OPSC) 及關於 兒童捲入武裝衝突之任擇議定書 (OPAC)"}, {"co_id": "CRC2-CO70", "cycle": 2, "co_paragraph": "70", "text_zh": "委員會注意到政府已努力 將 OPSC 融入現行相關法令及措施 。然 而，委員會建議政府對所有法規進行檢視，以確保完全遵守 OPSC 及 OPAC 規定的義務。 肆、執行及報告 一、追蹤"}, {"co_id": "CRC2-CO71", "cycle": 2, "co_paragraph": "71", "text_zh": "委員會建議政府採取一切適當措施，確保結論性意見完全落實，並 向兒少，包括不利處境兒少都能廣泛宣傳。並建議以國家語言廣泛 宣傳第二次定期報告、問題清單的答復及本結論性意見。"}], "esrs": [{"report_id": "ESR-2017-TAASA", "year": 2017, "ngo_name": "台灣少年權益與福利促進聯盟", "focus_articles": "[4, 6, 12, 19, 24, 27, 31, 37, 40]"}, {"report_id": "ESR-2022-COVENANTSWATCH", "year": 2022, "ngo_name": "人權公約施行監督聯盟", "focus_articles": "[37, 40, 39, 22]"}, {"report_id": "ESR-2022-CRRC", "year": 2022, "ngo_name": "台灣兒童權利公約聯盟", "focus_articles": "[4, 6, 12, 19, 20, 24, 27, 31, 34, 37, 40]"}, {"report_id": "ESR-2022-HEF", "year": 2022, "ngo_name": "人本教育基金會", "focus_articles": "[3, 19, 28, 37]"}, {"report_id": "ESR-2022-JRF", "year": 2022, "ngo_name": "民間司法改革基金會", "focus_articles": "[37, 39, 40]"}]}, {"crc_id": "CRC-39", "no": 39, "name_zh": "復原與重新融入", "name_en": "", "text_zh": "", "plain_zh": "被傷害過的小孩,有權獲得幫助讓自己慢慢好起來、回到正常生活。", "cluster": "", "gcs": [], "pis": ["PI-01", "PI-07", "PI-12"], "cos": [{"co_id": "CRC1-CO29", "cycle": 1, "co_paragraph": "29", "text_zh": "委員會注意到，有關保護兒少之立法和民法，皆要求法院或其他 單位的決定應以兒少最佳利益為基礎。委員會建議此權利如下： （1） 符合聯合國兒童權利委員會第 14 號一般性意見有關兒少最 佳利益的解釋； （2） 在所有立法、行政和司法訴訟程序與決定，以及和兒童相關 並對其產生影響的所有政策、方案和計畫，包括移民和少年 司法的法律、法規中，整全性並一貫地落實。 生命、生存及發展權（第 6 條）"}, {"co_id": "CRC1-CO30", "cycle": 1, "co_paragraph": "30", "text_zh": "委員會注意到國家承認兒少的高自殺率及自殺企圖，並建議政府 評估及處理導致兒少自殺的因素，且加強現行降低兒少高自殺率 的努力。 兒少表意權（第 12 條）"}, {"co_id": "CRC1-CO31", "cycle": 1, "co_paragraph": "31", "text_zh": "委員會欣見學校及地方政府委員會納入兒少代表，尤其讚賞課綱 審議會納入兒少參與。然而，委員會關注持續限制兒少在家庭、 學校及社區自由、安全地發聲的社會文化氛圍。"}, {"co_id": "CRC1-CO32", "cycle": 1, "co_paragraph": "32", "text_zh": "委員會摯盼政府關注聯合國兒童權利委員會第 12 號一般性意見 所列兒少陳述意見的權利，並建議政府依據第 12 條公約採取措 施，以加強落實該權利。委員會建議政府： （1） 進行研究，確認對於兒少最重要之議題，以及在各種場合如 何使兒少意見被聽取； （2） 針對父母、教師、社工、法官及其他從事兒少工作者，辦理 教育訓練及認知提升活動，以有效促進兒少在家庭、學校及 社區的參與； （3） 於立法決策階段建立兒少表意機制， 藉此強化國家層級的兒 少參與； （4） 採取有效的法規措施，包含告知兒少有陳述意見的權利、保 障兒少有意義地行使該權利等，以確保兒少於行政及立法程 序陳述意見之權利。 四、 公民權與自由 取得國籍權（第 7 條第 1 項）"}, {"co_id": "CRC1-CO33", "cycle": 1, "co_paragraph": "33", "text_zh": "委員會欣見政府作出努力，讓更多未被收養的無國籍兒童取得中 華民國（臺灣）國籍。委員會關注到在某些報告中，提及生父不 詳且外籍生母已返回原屬國之兒少的權利及身分問題，並建議政 府採取適當措施，確保這些兒少不會淪為無國籍人，也不會無法 享有與臺灣兒童相同的服務與利益。 表現自由（第 13 條）"}, {"co_id": "CRC1-CO34", "cycle": 1, "co_paragraph": "34", "text_zh": "委員會關注部分報告提及表現自由在實踐上可能受到限制，尤其 在校園中，因為成人對此抱持消極態度且兒少害怕受到懲罰。委 員會建議政府確保兒少在所有情形下都能享有表現自由，並促進 支持之，例如促進支持在校內外發行散布報紙、刊物或其他出版 品。 集會結社及和平集會自由（第 15 條）"}, {"co_id": "CRC1-CO35", "cycle": 1, "co_paragraph": "35", "text_zh": "委員會關切未滿 20 歲的兒少及青年無法自行成立團體，只能在 父母或監護人同意下加入現存團體。此與兒少結社自由權不符， 也缺少對兒少發展能力的尊重。"}, {"co_id": "CRC1-CO36", "cycle": 1, "co_paragraph": "36", "text_zh": "委員會建議政府採取立法及其他必要的措施，確保兒少依據其年 齡、成熟度及發展能力，享有不受任何歧視的結社自由、和平集 會的自由並包括和平抗議的自由。 隱私權（第 16 條）"}, {"co_id": "CRC1-CO37", "cycle": 1, "co_paragraph": "37", "text_zh": "委員會關切有報告提到，老師以不是法律所規定的理由，搜查學 生個人物品，甚而洩漏學生的秘密。委員會建議政府採取一切必 要措施，避免學生隱私受到非法、恣意的侵犯。老師們應該被告 知這類保障隱私的法令，而且當老師們違反法令時，必須受到懲 處。 不受酷刑或其他形式殘忍、不人道或有辱人格待遇或處罰之權利（第 37 條第 1 項（a）款）"}, {"co_id": "CRC1-CO64", "cycle": 1, "co_paragraph": "64", "text_zh": "委員會欣見政府為解決兒童肥胖問題所採取的一系列措施，但建 議： （1） 政府評估及監測這些措施的成效； （2） 在學校量測兒童體重時應審慎進行， 確保過程保護兒童隱私 且不會使兒童受到羞辱。"}, {"co_id": "CRC1-CO65", "cycle": 1, "co_paragraph": "65", "text_zh": "委員會指出，政府自 2011 年起採行逐步全面性推動整體兒少性 教育及生育保健計畫（包括教材、課程、方案及活動等）。委員會 亦指出，多個 NGO 對其成效及合宜性表達強烈關切，性傳染病 發生率仍高、部分疾病發生率正在增加，且仍有相當比例的青少 年懷孕。"}, {"co_id": "CRC1-CO66", "cycle": 1, "co_paragraph": "66", "text_zh": "委員會建議政府檢討現行計畫內容，評估是否需修訂以改善其成 效及確保其合宜性 。 檢討過程應諮詢所有利害關係人，包括兒少、 家長團體、衛生專業人員和教育工作者。"}, {"co_id": "CRC1-CO67", "cycle": 1, "co_paragraph": "67", "text_zh": "委員會進一步建議審查評估現行的性健康和生育保健計畫是否： （1） 與經濟社會和文化權利委員會第 22 號一般性意見（關於少 年性健康與生育保健） 、聯合國兒童權利委員會第 4 號一般 性意見（關於少年健康與發展）及第 20 號一般性意見（關 於兒少權利）的內容一致； （2） 適齡且具實證基礎； （3） 旨在保護所有兒少的性健康和生育保健權，包括 LGBTI 兒 少及身心障礙兒少； （4） 符合《CRC》第12 條規定，於方案設計、實施及評估時納入 兒少意見； （5） 在兒少發生性行為之前，提供兒少親密關係應互相尊重等相 關資訊，並培養兒少對於性行為的正確觀念； （6） 為懷孕少女提供適當的資訊及支持服務； （7） 教導父母瞭解兒少的性健康及生育保健相關權利。"}, {"co_id": "CRC1-CO68", "cycle": 1, "co_paragraph": "68", "text_zh": "委員會聽到兒少代表對環境品質以及可能損害其健康的擔憂。委 員會建議政府採取措施監測環境對兒少健康的影響，也建議政府 建立相關制度或流程，使兒少得以向政府表達對環境或其他兒少 健康議題之關切，並參考聯合國兒童權利委員會繼 2016 年關於 兒少權利與環境之一般性討論所提出的建議，將兒少所表示的意 見納入適當的立法或行動中。 八、 教育休閒與文化活動（第 28 條至第 31 條） 教育權（第 28 條、第 29 條） 改善就學負擔差距"}, {"co_id": "CRC1-CO69", "cycle": 1, "co_paragraph": "69", "text_zh": "委員會欣見 6 至 15 歲的義務教育免收學費。然而，委員會關切 越來越多私立高中職學生須申請貸款才能負擔學費、其他學習費 用及生活開支。"}, {"co_id": "CRC1-CO70", "cycle": 1, "co_paragraph": "70", "text_zh": "委員會建議教育部全面檢視私立高中職收費情形，並建立審查機 制，以保護經濟弱勢學生免受私立學校過度收費。委員會進一步 建議政府推行適當計畫，協助無力償還貸款的學生。 學前教育"}, {"co_id": "CRC1-CO71", "cycle": 1, "co_paragraph": "71", "text_zh": "委員會對於公立和非營利幼兒園不足、就讀私立幼兒園帶給家長 的沉重經濟負擔表達關切。委員會亦關切地方主管機關需要額外 的人力和經費，才能落實《幼兒教育及照顧法》第 7 條。"}, {"co_id": "CRC2-CO29", "cycle": 2, "co_paragraph": "29", "text_zh": "委員會欣見政府在《 2022-2024 年國家人權行動計畫》中承諾在數 位環境下保護人權，包括兒少權利。委員會亦欣見政府提出 《媒體 素養教育白皮書》以及對偏鄉學校數位優先原則的承諾。 委員會建 議政府在實施有關數位人權的計畫時： (1) 將聯合國兒童權利委員會第 25 號一般性意見關於數位環境中的兒少 權利納入考量；及 (2) 促進有效的兒少參與以符合《CRC》第 12 條。 集會及結社自由"}, {"co_id": "CRC2-CO30", "cycle": 2, "co_paragraph": "30", "text_zh": "委員會關注到政府對兒少加入與組織社團以及參加公共集會能力的 擔憂。委員會建議政府審查所有相關立法，包括《社會團體法》 及 《集會遊行法》，以確保其符合《 CRC》第 15 條有關兒少自由結 社及和平集會的權利。 五、保護兒少免受暴力侵害（第 19 條、第 24 條第 3 款、第 28 條第 2 款、第 34 條、第 37 條（a）項及第 39 條） 虐待與疏忽法律定義"}, {"co_id": "CRC2-CO31", "cycle": 2, "co_paragraph": "31", "text_zh": "委員會肯定政府以法律及解釋文件定義虐待及疏忽之努力。 委員會 建議參照聯合國兒童權利委員會第 8 號及第 13 號一般性意見檢視虐 待及疏忽的定義。委員會也建議將之運用在未來行動上，包含數據 蒐集及影響評估。 暴力根本原因分析及通報"}, {"co_id": "CRC2-CO32", "cycle": 2, "co_paragraph": "32", "text_zh": "委員會注意到政府對於全面預防暴力的努力，但關注暴力持續發生 的現象，尤其是學校。委員會建議政府持續投入教師、社會工作人 員及其他處理兒少事務專業人員的教育訓練。委員會也建議政府鼓 勵更多關於暴力根本原因分析之研究，以及暴力發生事件被通報的 占比。 數位環境下的暴力"}, {"co_id": "CRC2-CO33", "cycle": 2, "co_paragraph": "33", "text_zh": "政府已開始處理性暴力各方面的立法及實際行動，包含數位環境。 然而，委員會關心學校與安置機構兒少性虐待案件增加。 委員會建 議政府為執行《兒童及少年性剝削防制條例 》發展處理數位環境性 暴力的機制，並投入人力與預算資源，以保護兒少權益。 保護受害及目睹犯罪兒少"}, {"co_id": "CRC2-CO34", "cycle": 2, "co_paragraph": "34", "text_zh": "為發展受害及目睹犯罪兒少之協調系統，政府已建立非常周延的合 作機制：《重大兒童及少年虐待司法早期介入三方合作流程》，然 而，委員會關切此機制的執行及成效。 委員會建議針對此機制建立 常規的定期評估。委員會建議政府思考建置 Barnahus（兒童 之 家），它是個專門晤談受害及目睹犯罪兒少之機構 ，並配置適當合 格的專業人員處理。 9"}, {"co_id": "CRC2-CO35", "cycle": 2, "co_paragraph": "35", "text_zh": "政府已經在法律及實務方面為受害及目睹犯罪兒少提供很多復歸社 會的措施，但尚未看到成果。 委員會建議政府密切追蹤這些法律及 行政措施的成效，並進行資料分析，確保受害及目睹犯罪兒少能復 歸社會。 六、家庭環境與替代性照顧(第 5 條、第 9 條至第 11 條、第 18 條第 1 及 2 項、第 20 條、第 21 條、第 25 條及第 27 條第 4 項) 無法在家庭環境中成長的兒少/替代性照顧"}, {"co_id": "CRC2-CO36", "cycle": 2, "co_paragraph": "36", "text_zh": "委員會讚賞政府所提出的兒少替代性照顧政策，這份政策中所發現 的問題、解決策略及目標都很重要。委員會格外欣見政策的重點有 放在預防替代性照顧所需要的資源上。 委員會建議應特別關注身心 障礙兒少的家庭，使其 能給予身心障礙兒少適當的照顧，包括促成 及協助這些父母（監護人）的自助團體，必要時，應提供喘息服 務。"}, {"co_id": "CRC2-CO37", "cycle": 2, "co_paragraph": "37", "text_zh": "委員會欣見政府已規劃將團體家庭納入法定的替代性照顧資源，因 此，當住宿式照顧被視為兒少最佳利益時，能優先考量安置在團體 家庭的照顧環境，而非大型的安置機構。 委員會建議政府應配置適 當的資源以執行這項目標。"}, {"co_id": "CRC2-CO64", "cycle": 2, "co_paragraph": "64", "text_zh": "製造、販賣或運輸非法毒品的兒少被起訴，如果罪名成立，最高可 判處 4 年有期徒刑。委員會建議政府採取一切適當措施，包括在必 要時修法，以確保對於從事製造、販賣或運輸非法毒品的兒少，改 以罰金刑及轉向處遇等替代處分，剝奪自由應為最後手段。 觸法兒少"}, {"co_id": "CRC2-CO65", "cycle": 2, "co_paragraph": "65", "text_zh": "委員會欣見政府依據首次結論性意見修正《少年事件處理法》，意 指廢除少年虞犯（身分 罪），且未滿 12 歲兒童犯罪不會被起訴。 依據《少年事件處理法》，未滿 18 歲少年觸法行為得以少年保護事 件或少年刑事案件處理。然而，委員會關切的是，這可能意指依據 《少年事件處理法》判刑的 12 歲或 13 歲兒少會被收容在少年觀護 所。委員會建議政府修正《少年事件處理法》，確保不起訴未滿 14 歲的兒少。"}, {"co_id": "CRC2-CO66", "cycle": 2, "co_paragraph": "66", "text_zh": "委員會注意到政府機關在會議過程中所提供的資訊，對於父母(監護 人)探視矯正機關的兒少是沒有任何限制的。然而， 委員會關切的 是，這些機關自己設置的規定，可能導致家人探視的限制或歧視。 關於家人探視兒少與透過電話及 (或)社群媒體（social media ）連絡 的政策，委員會鼓勵政府提供矯正機關一套相關規定。對於入監服 刑的少年也應有類似規定。"}, {"co_id": "CRC2-CO67", "cycle": 2, "co_paragraph": "67", "text_zh": "委員會建議，收容兒少使其 與父母(監護人)分離均能採取《 CRC》 第 25 條的定期評估，特別注意兒少與父母(監護人)團聚的可能性。 修復式司法"}, {"co_id": "CRC2-CO68", "cycle": 2, "co_paragraph": "68", "text_zh": "《少年事件處理法》提供少年法庭為兒少尋求外部組織提供修復式 司法的可能性。 委員會鼓勵政府儘快實施，成為少年法庭選項之 一，並使修復式司法能整合為兒少司法的一部分。 買賣兒童、性剝削及性虐待兒童"}, {"co_id": "CRC2-CO69", "cycle": 2, "co_paragraph": "69", "text_zh": "委員會注意到，政府採取措施處理網路散播性虐待影像問題的過程 中，已融入 OPSC 任擇議定書及 CRC 對兒童賣淫及色情相關規定。 委員會建議政府制定一個綜合性的政策，包括《CRC》一般性原則 的執行，以防止對兒少的買賣及性剝削，該政策應符合聯合國兒童 權利委員會在其 OPSC 實施指南中提出的所有建議。 十一、公約任擇議定書的通過及採納 關於買賣兒童、兒童賣淫及兒童色情問題之任擇議定書 (OPSC) 及關於 兒童捲入武裝衝突之任擇議定書 (OPAC)"}, {"co_id": "CRC2-CO70", "cycle": 2, "co_paragraph": "70", "text_zh": "委員會注意到政府已努力 將 OPSC 融入現行相關法令及措施 。然 而，委員會建議政府對所有法規進行檢視，以確保完全遵守 OPSC 及 OPAC 規定的義務。 肆、執行及報告 一、追蹤"}, {"co_id": "CRC2-CO71", "cycle": 2, "co_paragraph": "71", "text_zh": "委員會建議政府採取一切適當措施，確保結論性意見完全落實，並 向兒少，包括不利處境兒少都能廣泛宣傳。並建議以國家語言廣泛 宣傳第二次定期報告、問題清單的答復及本結論性意見。"}], "esrs": [{"report_id": "ESR-2022-COVENANTSWATCH", "year": 2022, "ngo_name": "人權公約施行監督聯盟", "focus_articles": "[37, 40, 39, 22]"}, {"report_id": "ESR-2022-GOH", "year": 2022, "ngo_name": "勵馨基金會", "focus_articles": "[19, 34, 35, 39]"}, {"report_id": "ESR-2022-JRF", "year": 2022, "ngo_name": "民間司法改革基金會", "focus_articles": "[37, 39, 40]"}, {"report_id": "ESR-2022-TWRF", "year": 2022, "ngo_name": "婦女救援基金會", "focus_articles": "[19, 34, 35, 36, 39]"}]}, {"crc_id": "CRC-40", "no": 40, "name_zh": "少年司法", "name_en": "", "text_zh": "", "plain_zh": "被警察說犯法的小孩,有權找律師、不能被逼著承認、可以不服判決去申訴。", "cluster": "", "gcs": [], "pis": ["PI-05"], "cos": [{"co_id": "CRC1-CO64", "cycle": 1, "co_paragraph": "64", "text_zh": "委員會欣見政府為解決兒童肥胖問題所採取的一系列措施，但建 議： （1） 政府評估及監測這些措施的成效； （2） 在學校量測兒童體重時應審慎進行， 確保過程保護兒童隱私 且不會使兒童受到羞辱。"}, {"co_id": "CRC1-CO65", "cycle": 1, "co_paragraph": "65", "text_zh": "委員會指出，政府自 2011 年起採行逐步全面性推動整體兒少性 教育及生育保健計畫（包括教材、課程、方案及活動等）。委員會 亦指出，多個 NGO 對其成效及合宜性表達強烈關切，性傳染病 發生率仍高、部分疾病發生率正在增加，且仍有相當比例的青少 年懷孕。"}, {"co_id": "CRC1-CO66", "cycle": 1, "co_paragraph": "66", "text_zh": "委員會建議政府檢討現行計畫內容，評估是否需修訂以改善其成 效及確保其合宜性 。 檢討過程應諮詢所有利害關係人，包括兒少、 家長團體、衛生專業人員和教育工作者。"}, {"co_id": "CRC1-CO67", "cycle": 1, "co_paragraph": "67", "text_zh": "委員會進一步建議審查評估現行的性健康和生育保健計畫是否： （1） 與經濟社會和文化權利委員會第 22 號一般性意見（關於少 年性健康與生育保健） 、聯合國兒童權利委員會第 4 號一般 性意見（關於少年健康與發展）及第 20 號一般性意見（關 於兒少權利）的內容一致； （2） 適齡且具實證基礎； （3） 旨在保護所有兒少的性健康和生育保健權，包括 LGBTI 兒 少及身心障礙兒少； （4） 符合《CRC》第12 條規定，於方案設計、實施及評估時納入 兒少意見； （5） 在兒少發生性行為之前，提供兒少親密關係應互相尊重等相 關資訊，並培養兒少對於性行為的正確觀念； （6） 為懷孕少女提供適當的資訊及支持服務； （7） 教導父母瞭解兒少的性健康及生育保健相關權利。"}, {"co_id": "CRC1-CO68", "cycle": 1, "co_paragraph": "68", "text_zh": "委員會聽到兒少代表對環境品質以及可能損害其健康的擔憂。委 員會建議政府採取措施監測環境對兒少健康的影響，也建議政府 建立相關制度或流程，使兒少得以向政府表達對環境或其他兒少 健康議題之關切，並參考聯合國兒童權利委員會繼 2016 年關於 兒少權利與環境之一般性討論所提出的建議，將兒少所表示的意 見納入適當的立法或行動中。 八、 教育休閒與文化活動（第 28 條至第 31 條） 教育權（第 28 條、第 29 條） 改善就學負擔差距"}, {"co_id": "CRC1-CO69", "cycle": 1, "co_paragraph": "69", "text_zh": "委員會欣見 6 至 15 歲的義務教育免收學費。然而，委員會關切 越來越多私立高中職學生須申請貸款才能負擔學費、其他學習費 用及生活開支。"}, {"co_id": "CRC1-CO70", "cycle": 1, "co_paragraph": "70", "text_zh": "委員會建議教育部全面檢視私立高中職收費情形，並建立審查機 制，以保護經濟弱勢學生免受私立學校過度收費。委員會進一步 建議政府推行適當計畫，協助無力償還貸款的學生。 學前教育"}, {"co_id": "CRC1-CO71", "cycle": 1, "co_paragraph": "71", "text_zh": "委員會對於公立和非營利幼兒園不足、就讀私立幼兒園帶給家長 的沉重經濟負擔表達關切。委員會亦關切地方主管機關需要額外 的人力和經費，才能落實《幼兒教育及照顧法》第 7 條。"}, {"co_id": "CRC2-CO64", "cycle": 2, "co_paragraph": "64", "text_zh": "製造、販賣或運輸非法毒品的兒少被起訴，如果罪名成立，最高可 判處 4 年有期徒刑。委員會建議政府採取一切適當措施，包括在必 要時修法，以確保對於從事製造、販賣或運輸非法毒品的兒少，改 以罰金刑及轉向處遇等替代處分，剝奪自由應為最後手段。 觸法兒少"}, {"co_id": "CRC2-CO65", "cycle": 2, "co_paragraph": "65", "text_zh": "委員會欣見政府依據首次結論性意見修正《少年事件處理法》，意 指廢除少年虞犯（身分 罪），且未滿 12 歲兒童犯罪不會被起訴。 依據《少年事件處理法》，未滿 18 歲少年觸法行為得以少年保護事 件或少年刑事案件處理。然而，委員會關切的是，這可能意指依據 《少年事件處理法》判刑的 12 歲或 13 歲兒少會被收容在少年觀護 所。委員會建議政府修正《少年事件處理法》，確保不起訴未滿 14 歲的兒少。"}, {"co_id": "CRC2-CO66", "cycle": 2, "co_paragraph": "66", "text_zh": "委員會注意到政府機關在會議過程中所提供的資訊，對於父母(監護 人)探視矯正機關的兒少是沒有任何限制的。然而， 委員會關切的 是，這些機關自己設置的規定，可能導致家人探視的限制或歧視。 關於家人探視兒少與透過電話及 (或)社群媒體（social media ）連絡 的政策，委員會鼓勵政府提供矯正機關一套相關規定。對於入監服 刑的少年也應有類似規定。"}, {"co_id": "CRC2-CO67", "cycle": 2, "co_paragraph": "67", "text_zh": "委員會建議，收容兒少使其 與父母(監護人)分離均能採取《 CRC》 第 25 條的定期評估，特別注意兒少與父母(監護人)團聚的可能性。 修復式司法"}, {"co_id": "CRC2-CO68", "cycle": 2, "co_paragraph": "68", "text_zh": "《少年事件處理法》提供少年法庭為兒少尋求外部組織提供修復式 司法的可能性。 委員會鼓勵政府儘快實施，成為少年法庭選項之 一，並使修復式司法能整合為兒少司法的一部分。 買賣兒童、性剝削及性虐待兒童"}, {"co_id": "CRC2-CO69", "cycle": 2, "co_paragraph": "69", "text_zh": "委員會注意到，政府採取措施處理網路散播性虐待影像問題的過程 中，已融入 OPSC 任擇議定書及 CRC 對兒童賣淫及色情相關規定。 委員會建議政府制定一個綜合性的政策，包括《CRC》一般性原則 的執行，以防止對兒少的買賣及性剝削，該政策應符合聯合國兒童 權利委員會在其 OPSC 實施指南中提出的所有建議。 十一、公約任擇議定書的通過及採納 關於買賣兒童、兒童賣淫及兒童色情問題之任擇議定書 (OPSC) 及關於 兒童捲入武裝衝突之任擇議定書 (OPAC)"}, {"co_id": "CRC2-CO70", "cycle": 2, "co_paragraph": "70", "text_zh": "委員會注意到政府已努力 將 OPSC 融入現行相關法令及措施 。然 而，委員會建議政府對所有法規進行檢視，以確保完全遵守 OPSC 及 OPAC 規定的義務。 肆、執行及報告 一、追蹤"}, {"co_id": "CRC2-CO71", "cycle": 2, "co_paragraph": "71", "text_zh": "委員會建議政府採取一切適當措施，確保結論性意見完全落實，並 向兒少，包括不利處境兒少都能廣泛宣傳。並建議以國家語言廣泛 宣傳第二次定期報告、問題清單的答復及本結論性意見。"}], "esrs": [{"report_id": "ESR-2017-TAASA", "year": 2017, "ngo_name": "台灣少年權益與福利促進聯盟", "focus_articles": "[4, 6, 12, 19, 24, 27, 31, 37, 40]"}, {"report_id": "ESR-2022-COVENANTSWATCH", "year": 2022, "ngo_name": "人權公約施行監督聯盟", "focus_articles": "[37, 40, 39, 22]"}, {"report_id": "ESR-2022-CRRC", "year": 2022, "ngo_name": "台灣兒童權利公約聯盟", "focus_articles": "[4, 6, 12, 19, 20, 24, 27, 31, 34, 37, 40]"}, {"report_id": "ESR-2022-JRF", "year": 2022, "ngo_name": "民間司法改革基金會", "focus_articles": "[37, 39, 40]"}]}, {"crc_id": "CRC-42", "no": 42, "name_zh": "公約宣傳", "name_en": "", "text_zh": "", "plain_zh": "", "cluster": "", "gcs": [], "pis": [], "cos": [{"co_id": "CRC1-CO1", "cycle": 1, "co_paragraph": "1", "text_zh": "中華民國（臺灣）立法院於 2014 年 6 月通過《兒童權利公約施 行法》 （下稱《CRC 施行法》） ，並於同年11 月 20 日開始施行， 作為《CRC》在臺灣實施之國內法化架構；2016 年 4 月 22 日立 法院通過加入 《CRC》 條約案， 總統於2016 年 5 月簽署加入書。"}, {"co_id": "CRC1-CO10", "cycle": 1, "co_paragraph": "10", "text_zh": "委員會鼓勵政府接受《關於兒童捲入武裝衝突問題之兒童權利公 約任擇議定書》及《關於買賣兒童、兒童賣淫和兒童色情問題之 兒童權利公約任擇議定書》。 全面性國家行動計畫"}, {"co_id": "CRC1-CO11", "cycle": 1, "co_paragraph": "11", "text_zh": "委員會建議政府制定並實施全面性國家行動計畫以實踐 《CRC》， 且納入地方政府、公民組織、相關專家、兒少及家長之參與。 協調"}, {"co_id": "CRC1-CO12", "cycle": 1, "co_paragraph": "12", "text_zh": "委員會欣見設立協調與推動兒少福利及權益保障政策的團隊，也 欣見行政院設立兒童及少年福利與權益促進小組。委員會建議政 府確保上開團隊以及小組具有充分的權力，並配有足夠的人力和 財力資源，以執行職務。"}, {"co_id": "CRC1-CO13", "cycle": 1, "co_paragraph": "13", "text_zh": "委員會建議立法院應成立兒童委員會。並於制定影響兒少及其人 權之法案時，由委員會諮詢兒少、專業團體和公民團體的意見。 獨立監督"}, {"co_id": "CRC1-CO14", "cycle": 1, "co_paragraph": "14", "text_zh": "委員會注意到且關心中華民國（臺灣）尚未成立獨立國家人權機 構。"}, {"co_id": "CRC1-CO2", "cycle": 1, "co_paragraph": "2", "text_zh": "行政院依據《CRC 施行法》，於2016 年 11 月發表首次國家報告 ， 並於 2017 年 3 月完成英文版。中華民國（臺灣）政府邀請 5 位 獨立國際兒權專家組成國際審查委員會（下稱委員會）審查首次 國家報告。5 位專家分別為 Jaap Doek（主席）（荷蘭），Judith Karp （以色列），Nigel Cantwell（英國/瑞士）；Laura Lundy（北愛爾 蘭）以及 John Tobin（澳洲）。"}, {"co_id": "CRC1-CO3", "cycle": 1, "co_paragraph": "3", "text_zh": "委員會審查了臺灣於 2017 年 3 月提交之首次國家報告，並收到 來自包含兒童團體組織等公民組織團體的替代報告及兒少報告。 委員會於 2017 年 6 月提出問題清單，於同年 9 月收到書面詳細 回復。委員會也收到公民組織對於問題清單之意見以及政府回應。"}, {"co_id": "CRC1-CO4", "cycle": 1, "co_paragraph": "4", "text_zh": "委員會於 2017 年 11 月 20 日與公民組織成員兒少舉行列入審查 會議之不公開會議。另於 2017 年 11 月 21 日及 22 日與政府代表 舉行公開會議 ， 於2017 年 11 月 24 日通過並發表本結論性意見。"}, {"co_id": "CRC1-CO5", "cycle": 1, "co_paragraph": "5", "text_zh": "委員會了解臺灣政府認真且努力的實踐《CRC》，並相當感謝相關 部會及政府機構派員出席會議，與委員會進行建設性對話。公民 組織之積極參與，尤其是兒少參與，亦對審查過程至關重要。 2"}, {"co_id": "CRC1-CO6", "cycle": 1, "co_paragraph": "6", "text_zh": "委員會感謝衛生福利部（特別是《CRC》幕僚單位）提供實質協 助與後勤支援。 貳、 承認之國際人權公約"}, {"co_id": "CRC1-CO7", "cycle": 1, "co_paragraph": "7", "text_zh": "委員會欣見臺灣除《CRC》外，亦接受下列國際人權公約： （1）《經濟社會文化權利國際公約》； （2）《公民與政治權利國際公約》； （3）《消除對婦女一切形式歧視公約》； （4）《身心障礙者權利公約》。 參、 關切重點與建議 一、 一般執行措施（第 4、42、44（6）條） 立法"}, {"co_id": "CRC1-CO8", "cycle": 1, "co_paragraph": "8", "text_zh": "委員會讚賞中華民國 （臺灣） 毫無保留地接受 《CRC》 ，且制定特 別法施行 《CRC》 。 委員會建議政府於檢視國內法律是否與《CRC》 規定一致時，應進行兒少權利影響評估。"}, {"co_id": "CRC1-CO9", "cycle": 1, "co_paragraph": "9", "text_zh": "委員會建議應修正《CRC 施行法》 ，明定國內法律與《CRC》牴 觸時，優先適用《CRC》。"}, {"co_id": "CRC2-CO1", "cycle": 2, "co_paragraph": "1", "text_zh": "國際審查委員會（下稱委員會）於 2017 年 11 月 20 日至 22 日審查中 華民國（臺灣）首次國家報告（下稱首次國際審查），並於 2017 年 11 月 24 日提出首次國家報告的結論性意見（首次結論性意見）。"}, {"co_id": "CRC2-CO10", "cycle": 2, "co_paragraph": "10", "text_zh": "委員會欣見政府努力宣導《CRC》，特別是透過《CRC 教育訓練及 成效評核實施計畫》。然而，委員會關切 ：這些提高意識的活動並 未有效協調，尤其是政府官員、從事兒少相關工作的專業人員、媒 體、父母（監護人）及兒少本身，仍然對《CRC》認識不足。委員 會建議政府與公民團體及媒體合作，並在兒少參與下，進一步加強 其意識培訓方案。 國家監督"}, {"co_id": "CRC2-CO11", "cycle": 2, "co_paragraph": "11", "text_zh": "委員會欣見政府運用兒少權利影響評估機制持續監測的資訊。 委員 會建議政府持續評估其法律及相關措施是否符合國際標準。 獨立監督"}, {"co_id": "CRC2-CO12", "cycle": 2, "co_paragraph": "12", "text_zh": "委員會欣見國家人權委員會（NHRC）於 2020 年成立及其為兒少權 利的初步努力。但關切國家人權委員會能 否依據聯合國兒童權利委 員會第 2 號一般性意見，帶頭全面促進兒少權利，並確實處理兒少 權利遭受侵害之案件。委員會建議政府於國家人權委員會內設立一 個人員、預算充足且訓練有素的單位，全面處理兒少權利問題，或 考慮設置獨立的兒少權利機構。委員會建議政府尋求國際支持，使 國家人權委員會能全面發揮保障兒少權利的功能。 1 有害做法，參閱 CRC 第 18 號一般性意見 國際合作"}, {"co_id": "CRC2-CO13", "cycle": 2, "co_paragraph": "13", "text_zh": "委員會讚賞政府對處於人道主義危機中兒少 的國際支持，以及政府 對非政府組織從事國際工作的支持。此外，委員會欣見政府為國際 知識及經驗交流以及與國際專家合作所做的努力。 委員會鼓勵政府 持續發展是類活動。 近用司法及申訴機制"}, {"co_id": "CRC2-CO14", "cycle": 2, "co_paragraph": "14", "text_zh": "對於兒少在教育、衛生、社會或其他體系中權利遭受侵害之事件， 政府已引進許多申訴程序，值得贊許。儘管如此，委員會仍然關注 兒少會因為各種障礙而不願通報自身權益遭受侵害的事件，例如對 申訴程序缺乏信任、害怕被識別、對申訴結果的公正性缺乏信心。 委員會建議政府持續改進申訴機制，以確保 其對兒少友善、保密及 獨立，並提供適當的救濟措施。委員會並建議兒少可以在所有環境 中近用申訴管道，包括教育、衛生、兒少保護及司法體系。 二、兒少之定義（第 1 條）"}, {"co_id": "CRC2-CO2", "cycle": 2, "co_paragraph": "2", "text_zh": "委員會欣見中華民國（ 臺灣）提交第二次國家報告及對問題清單的 書面回應，進一步加深我們對 臺灣兒少權利狀況的 瞭解。委員會對 能與政府許多部會的高階代表進行建設性對話表示讚許。委員會也 讚賞公民團體的積極參與，特別是兒少，這對審查過程至關重要。"}, {"co_id": "CRC2-CO3", "cycle": 2, "co_paragraph": "3", "text_zh": "委員會感謝衛生福利部，特別是其 CRC 團隊，為委員會提供實質的 後勤協助。 貳、締約國對於首次結論性意見已採取之措施及進展"}, {"co_id": "CRC2-CO4", "cycle": 2, "co_paragraph": "4", "text_zh": "委員會欣見 臺灣在首次國際審查後為制定及修正相關法律所做的最 大努力。委員會特別肯定以下法律的制定及修正：《自殺防治法》 (2019 年)、《兒童及少年福利與權益保障法》（2021 年）、《2022- 2024 年國家人權行動計畫》（2022 年）、《兒少替代性照顧政策》 （2022 年）。 參、關切重點與建議"}, {"co_id": "CRC2-CO5", "cycle": 2, "co_paragraph": "5", "text_zh": "委員會提醒締約國注意《 CRC》保障之所有權利，有其不可分割性 及相互依存性，並強調本結論性意見中所有建議的重要性。委員會 謹請中華民國政府（ 臺灣）（下稱政府）注意以下必須優先處理的 建議範圍：一般執行措施（第 6-14 點）；保護兒少免受暴力侵害 （第 31-35 點）；無法在家庭環境中成長的兒少（第 36-42 點）；身 心障礙兒少（第 45 點）；心理健康（第 47 點）；教育（第 53-57 點）；休息、遊戲及休閒（第 58-59 點）。 一、一般執行措施（第 4 條、第 42 條及第 44 條第 6 項） 立法"}, {"co_id": "CRC2-CO6", "cycle": 2, "co_paragraph": "6", "text_zh": "委員會讚賞政府啟動法規檢視的程序，期使國內法與《 CRC》一 致。惟部分法律、法規 及其他法案的制定尚未完成法規檢視程序， 仍有差距。 委員會建議政府儘速完成所有法規檢視，並開始討論及 審查《兒童及少年福利與權益保障法》，使其與《 CRC》的內容及 精神完全一致。 全面性政策及策略"}, {"co_id": "CRC2-CO7", "cycle": 2, "co_paragraph": "7", "text_zh": "委員會注意到政府努力著手起草兒少國家行動計畫，但對該計畫尚 未通過表示遺憾。委員會建議政府依據聯合國兒童權利委員會第5 號 一般性意見制定 及實施全面性行動計畫，以落實 《CRC》，且納入 地方政府、公民團體組織、專業人士、兒少及 父母（監護人） 的參 與。 協調"}, {"co_id": "CRC2-CO8", "cycle": 2, "co_paragraph": "8", "text_zh": "委員會讚賞行政院兒童及少年福利與權益 推動小組（下稱院兒權小 組）協調政府部門的努力，但委員會關注院兒權小組的性質及掌理 範圍的相關資訊，特別是其 組織的能量 及常規的功能。委員會建議 充分賦予院兒權小組權力，使其成為一個人員及資源充足，且能持 續協調政府部門的常設政府機關。 資源配置"}, {"co_id": "CRC2-CO9", "cycle": 2, "co_paragraph": "9", "text_zh": "政府已編列大量預算用於社會保護、友善兒少司法、兒少優質輔導 服務、與保護兒少免受暴力及有害做法 1侵害。委員會建議政府遵循 聯合國兒童權利委員會第 19 號一般性意見，且持續增加各類攸關兒 少權益的預算支出， 並評估是類支出對兒少當中最弱勢群體的影 響。 教育訓練"}], "esrs": []}];

(function() {
  const articles = window.CRC_ARTICLES;
  const grid = document.getElementById('grid');
  const tabs = document.getElementById('cluster-tabs');
  const q = document.getElementById('q');

  // Build cluster tabs
  const clusters = [...new Set(articles.map(a => a.cluster).filter(Boolean))].sort();
  const clusterLabels = {C:'C 一般原則',D:'D 公民權利',E:'E 暴力',F:'F 家庭/替代照顧',G:'G 健康/身障',H:'H 教育/休閒',I:'I 特別保護',K:'K 兒少司法',L:'L 數位環境',A:'A 一般執行',B:'B 統計'};
  let activeCluster = '';
  tabs.innerHTML = '<button class="active" data-c="">全部</button>' + clusters.map(c =>
    `<button data-c="${c}">${clusterLabels[c] || c}</button>`).join('');
  tabs.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    tabs.querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); activeCluster = b.dataset.c; render();
  }));

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function render() {
    const query = q.value.trim().toLowerCase();
    const filtered = articles.filter(a => {
      if (activeCluster && a.cluster !== activeCluster) return false;
      if (query) {
        const hay = (a.crc_id + ' ' + a.no + ' ' + a.name_zh + ' ' + a.name_en + ' ' + a.text_zh + ' ' + a.plain_zh).toLowerCase();
        if (!hay.includes(query)) return false;
      }
      return true;
    });

    grid.innerHTML = filtered.map(a => {
      const piLinks = a.pis.map(p => `<a href="issues/${p}.html" class="pi-pill">${p}</a>`).join('');
      const gcLinks = a.gcs.map(g => `<span class="gc-pill">${esc(g)}</span>`).join('');
      const coList = a.cos.length ? '<h4>結論性意見(' + a.cos.length + ')</h4><ul>' +
        a.cos.map(c => `<li>CRC${c.cycle} §${c.co_paragraph} <span class="meta">${esc((c.text_zh||"").slice(0,80))}…</span></li>`).join('') + '</ul>' : '';
      const esrList = a.esrs.length ? '<h4>對應民間影子報告(' + a.esrs.length + ')</h4><ul>' +
        a.esrs.map(e => `<li><a href="external-reports/${e.report_id}.html">${e.year} ${esc(e.ngo_name)}</a></li>`).join('') + '</ul>' : '';

      return `
        <div class="article-card" data-id="${a.crc_id}">
          <div class="head">
            <span class="crc-no">第 ${a.no} 條</span>
            ${a.cluster ? `<span class="cluster">${esc(clusterLabels[a.cluster] || a.cluster)}</span>` : ''}
          </div>
          <h3>${esc(a.name_zh)}</h3>
          ${a.name_en ? `<div class="name-en">${esc(a.name_en)}</div>` : ''}
          <div class="text-zh">${esc((a.text_zh||"").slice(0,200))}${(a.text_zh||"").length>200?'…':''}</div>
          ${a.plain_zh ? `<div class="plain-zh">兒少白話:${esc(a.plain_zh.slice(0,140))}</div>` : ''}
          <div class="links">
            ${piLinks}
            ${gcLinks}
          </div>
          <div class="stats">
            <span><strong>${a.pis.length}</strong> 議題 PI</span>
            <span><strong>${a.cos.length}</strong> 結論性意見</span>
            <span><strong>${a.esrs.length}</strong> 民間報告</span>
            <span style="margin-left:auto;color:var(--brand)">${a.cos.length || a.esrs.length ? '展開 ▾' : ''}</span>
          </div>
          <div class="expand-area">
            ${coList}
            ${esrList}
          </div>
        </div>`;
    }).join('');

    grid.querySelectorAll('.article-card').forEach(c => {
      c.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') return;
        c.classList.toggle('expanded');
      });
    });
  }
  q.addEventListener('input', render);
  render();
})();
</script>
</body>
</html>
