<!doctype html><html lang="zh-TW"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>三公約跨平台搜尋 — CEDAW / CRC / CRPD</title>
<meta name="description" content="跨三公約監督平台搜尋議題、CEDAW 條文、政府文件、倡議事件、政府機關、NGO。共 1,658 筆索引。">
<style>
body { font-family: "Noto Sans TC", -apple-system, sans-serif;
       background: #FAFAF7; color: #1F1F1F; line-height: 1.6; margin: 0; }
header { background: linear-gradient(135deg, #4B2480 0%, #B5371F 50%, #2D7059 100%);
        color: #fff; padding: 24px; }
header h1 { margin: 0 0 6px; font-family: "Noto Serif TC", serif; font-size: 24px; }
header p { margin: 0; opacity: 0.95; font-size: 13.5px; }
nav { background: #fff; padding: 10px 24px; border-bottom: 1px solid #E8E3D6; font-size: 13px; }
nav a { color: #4B2480; text-decoration: none; margin-right: 16px; font-weight: 600; }
main { max-width: 1100px; margin: 24px auto; padding: 0 24px; }
.search-form { display: flex; gap: 8px; border-bottom: 2px solid #4B2480; padding-bottom: 12px; margin-bottom: 16px; }
.search-form input { flex: 1; font-size: 22px; font-family: "Noto Serif TC", serif; border: none; background: transparent; padding: 8px 4px; outline: none; }
.search-form button { background: #4B2480; color: #fff; border: none; padding: 0 20px; cursor: pointer; font-weight: 600; border-radius: 4px; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.platform-chip { padding: 6px 14px; border: 1.5px solid; border-radius: 16px; cursor: pointer; font-size: 13px; font-weight: 600; user-select: none; }
.platform-chip.cedaw { border-color: #4B2480; color: #4B2480; }
.platform-chip.crc { border-color: #B5371F; color: #B5371F; }
.platform-chip.crpd { border-color: #2D7059; color: #2D7059; }
.platform-chip.active.cedaw { background: #4B2480; color: #fff; }
.platform-chip.active.crc { background: #B5371F; color: #fff; }
.platform-chip.active.crpd { background: #2D7059; color: #fff; }
.platform-chip .count { font-family: Inter, monospace; opacity: 0.7; margin-left: 4px; font-size: 11px; }
#hint { font-size: 13px; color: #5C5C5C; margin: 8px 0 16px; }
.result { display: flex; gap: 16px; padding: 14px 0; border-bottom: 1px solid #E8E3D6; }
.result-platform { min-width: 80px; padding: 5px 10px; border-radius: 4px; font-size: 11.5px; font-weight: 700; color: #fff; height: fit-content; text-align: center; }
.result-body { flex: 1; }
.result-type { font-size: 11px; color: #8A8A8A; text-transform: uppercase; letter-spacing: 0.06em; }
.result-title { font-family: "Noto Serif TC", serif; font-size: 16px; font-weight: 600; margin: 4px 0; }
.result-title a { color: #1F1F1F; text-decoration: none; }
.result-title a:hover { color: #4B2480; }
.result-snippet { font-size: 13px; color: #5C5C5C; }
mark { background: rgba(194,24,91,0.18); color: #1F1F1F; padding: 0 2px; }
.empty { text-align: center; padding: 48px; color: #5C5C5C; font-style: italic; }
.loading { text-align: center; padding: 48px; color: #5C5C5C; }
</style></head><body>
<header>
<h1>🌐 三公約跨平台搜尋</h1>
<p>同時搜尋 CEDAW(婦女)/ CRC(兒少)/ CRPD(身權)三平台議題、條文、政府文件、倡議者、事件 — 共 <strong>1,658</strong> 筆索引</p>
</header>
<nav style="background:#fff;padding:12px 24px;border-bottom:1px solid #E8E3D6;"><a href="cross-platform.html" style="color:#4B2480;text-decoration:none;font-size:13.5px;font-weight:600;margin-right:14px;">統合儀表板</a><a href="cross-platform-keywords.html" style="color:#4B2480;text-decoration:none;font-size:13.5px;font-weight:600;margin-right:14px;">📊 關鍵字比對</a><a href="crpd-coverage-diagnosis.html" style="color:#4B2480;text-decoration:none;font-size:13.5px;font-weight:600;margin-right:14px;">🔬 CRPD 覆蓋</a><a href="intersectional-topics.html" style="color:#4B2480;text-decoration:none;font-size:13.5px;font-weight:600;margin-right:14px;">🎯 交織議題</a><a href="cross-platform-frequency.html" style="color:#4B2480;text-decoration:none;font-size:13.5px;font-weight:600;margin-right:14px;">📈 詞頻時序</a><span style="color:#1F1F1F;background:#ECE0F2;padding:5px 10px;border-radius:4px;font-size:13px;font-weight:700;margin-right:6px;border:1px solid #4B2480;">🔍 跨平台搜尋</span><a href="pi-evidence-scorecard.html" style="color:#4B2480;text-decoration:none;font-size:13.5px;font-weight:600;margin-right:14px;">📋 PI 評分</a><a href="cross-platform-search-en.html" style="float:right;background:#4B2480;color:#fff;padding:4px 10px;border-radius:4px;text-decoration:none;font-weight:600;">🌐 English</a></nav>


<main>
<form class="search-form" onsubmit="event.preventDefault(); doSearch();">
<input id="q" type="search" autofocus placeholder="搜尋議題、CEDAW、修法、倡議者、政府文件...(三公約資料)">
<button type="submit">搜尋</button>
</form>

<div class="filters" id="filters">
<span class="platform-chip cedaw active" data-platform="cedaw">♀ CEDAW <span class="count">656</span></span>
<span class="platform-chip crc active" data-platform="crc">☻ CRC <span class="count">457</span></span>
<span class="platform-chip crpd active" data-platform="crpd">⚙ CRPD <span class="count">545</span></span>
</div>

<div id="hint">輸入關鍵字後即時搜尋三平台索引</div>
<div id="results"><div class="loading">正在載入跨平台索引...</div></div>
</main>

<script>
let INDEX = [];
let activePlatforms = new Set(['cedaw','crc','crpd']);

function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function highlight(t, q) {
  if (!q || !t) return t || '';
  const re = new RegExp('(' + escapeRe(q) + ')', 'gi');
  return String(t).replace(re, '<mark>$1</mark>');
}

function doSearch() {
  const q = (document.getElementById('q').value || '').trim();
  const qLow = q.toLowerCase();
  const out = [];
  for (const e of INDEX) {
    if (!activePlatforms.has(e.platform)) continue;
    if (qLow) {
      const hay = ((e.title||'') + ' ' + (e.title_en||'') + ' ' + (e.snippet||'')).toLowerCase();
      if (!hay.includes(qLow)) continue;
    }
    out.push(e);
  }
  // 按 platform 群組
  const byPlat = { cedaw: [], crc: [], crpd: [] };
  for (const r of out) (byPlat[r.platform] || (byPlat[r.platform]=[])).push(r);

  let html = '';
  if (out.length === 0) {
    html = '<div class="empty">沒有命中,試試其他關鍵字或開啟更多平台</div>';
  } else {
    html = out.slice(0, 200).map(r => {
      // Wave 145: cross-field highlight — render title_en if EN query matches there
      const titleEn = r.title_en && r.title_en !== r.title ? highlight(r.title_en, q) : '';
      const idChip = r.id ? `<span style="font-family:Inter,monospace;background:#F1EFEA;padding:1px 6px;border-radius:3px;font-size:11px;">${highlight(r.id, q)}</span>` : '';
      const typeChip = r.type ? `<span style="color:#5C5C5C">${highlight(r.type, q)}</span>` : '';
      const meta = [typeChip, idChip].filter(Boolean).join(' · ');
      return `
      <div class="result">
        <div class="result-platform" style="background:${r.platform_color}">${r.platform_short}</div>
        <div class="result-body">
          <div class="result-type">${meta}</div>
          <div class="result-title"><a href="${r.url}" target="_blank" rel="noopener">${highlight(r.title, q)}</a></div>
          ${titleEn ? `<div style="font-size:12px;color:#5C2A7E;margin:2px 0;font-style:italic;">${titleEn}</div>` : ''}
          ${r.snippet ? `<div class="result-snippet">${highlight(r.snippet, q)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    if (out.length > 200) html += `<div class="empty">顯示前 200 筆,縮小範圍可看其餘 ${out.length - 200} 筆</div>`;
  }
  document.getElementById('results').innerHTML = html;
  document.getElementById('hint').textContent = q
    ? `命中 ${out.length} 筆 · "${q}"(CEDAW ${byPlat.cedaw.length} / CRC ${byPlat.crc.length} / CRPD ${byPlat.crpd.length})`
    : `總 ${INDEX.filter(e => activePlatforms.has(e.platform)).length} 筆索引`;
}

(async () => {
  try {
    const r = await fetch('api/cross_platform_search.json', {cache: 'force-cache'});
    const data = await r.json();
    INDEX = data.entries || [];
    document.getElementById('hint').textContent = `總 ${INDEX.length} 筆三公約索引`;
    doSearch();
  } catch (e) {
    document.getElementById('results').innerHTML = `<div class="empty">索引載入失敗:${e.message}</div>`;
  }
})();

document.getElementById('q').addEventListener('input', () => {
  clearTimeout(window._t);
  window._t = setTimeout(doSearch, 100);
});
document.getElementById('filters').addEventListener('click', e => {
  const chip = e.target.closest('.platform-chip');
  if (!chip) return;
  const p = chip.dataset.platform;
  if (activePlatforms.has(p)) activePlatforms.delete(p); else activePlatforms.add(p);
  if (activePlatforms.size === 0) ['cedaw','crc','crpd'].forEach(x => activePlatforms.add(x));
  document.querySelectorAll('.platform-chip').forEach(c => {
    c.classList.toggle('active', activePlatforms.has(c.dataset.platform));
  });
  doSearch();
});
</script>
</body></html>
